name: Research question
description: Propose a question the lab can investigate
title: "[RQ] "
labels: ["type: research-question", "status: triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Research question
      description: Phrase it so evidence could change the answer.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why it matters
    validations:
      required: true
  - type: textarea
    id: observable
    attributes:
      label: Observable indicators
      description: What behavior or artifacts could provide evidence?
    validations:
      required: true
  - type: textarea
    id: prior
    attributes:
      label: Related evidence or prior work
  - type: textarea
    id: falsification
    attributes:
      label: What could change your mind?

