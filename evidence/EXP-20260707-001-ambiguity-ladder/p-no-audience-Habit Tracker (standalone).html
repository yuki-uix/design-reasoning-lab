document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ch(55% 0.02 55); margin-top: 2px;\">{{ todayDateLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ startNewHabit }}\" style=\"width: 44px; height: 44px; border-radius: 14px; border: none; background: oklch(58% 0.08 150); color: white; font: 600 22px/1 'Inter', sans-serif; cursor: pointer; flex-shrink: 0;\" style-hover=\"background: oklch(52% 0.08 150);\">+<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 20px; padding: 16px 18px; background: oklch(93% 0.035 150); border-radius: 20px; display: flex; align-items: center; gap: 12px;\">\n          <div style=\"width: 40px; height: 40px; border-radius: 50%; background: oklch(98.5% 0.006 75); display: flex; align-items: center; justify-content: center; font: 600 14px 'Fredoka', sans-serif; color: oklch(46% 0.08 150); flex-shrink: 0;\">{{ progressFraction }}<\u002Fdiv>\n          <div style=\"font: 500 14px/1.4 'Inter', sans-serif; color: oklch(35% 0.03 130);\">{{ progressMessage }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 20px;\">\n          <sc-for list=\"{{ habits }}\" as=\"habit\" hint-placeholder-count=\"4\">\n            <div style=\"{{ habit.cardStyle }}\">\n              <div style=\"{{ habit.iconStyle }}\">{{ habit.initial }}<\u002Fdiv>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"{{ habit.nameStyle }}\">{{ habit.name }}<\u002Fdiv>\n                <div style=\"font: 400 13px/1.4 'Inter', sans-serif; color: oklch(55% 0.02 55); margin-top: 2px;\">{{ habit.timeLabel }} · {{ habit.streakLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ habit.toggle }}\" style=\"{{ habit.checkStyle }}\">{{ habit.checkMark }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ allDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top: 24px; padding: 28px 22px; background: oklch(98.5% 0.006 75); border: 1.5px dashed oklch(70% 0.06 150); border-radius: 22px; text-align: center; animation: popIn 0.4s ease;\">\n            <div style=\"display: flex; justify-content: center; gap: 8px; margin-bottom: 14px;\">\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(80% 0.05 145);\"><\u002Fdiv>\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(70% 0.07 150); margin-top: 6px;\"><\u002Fdiv>\n              <div style=\"width: 10px; height: 10px; border-radius: 50%; background: oklch(80% 0.05 155);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font: 600 18px 'Fredoka', sans-serif; color: oklch(30% 0.03 130); margin-bottom: 6px;\">All done for today<\u002Fdiv>\n            <div style=\"font: 400 14px/1.5 'Inter', sans-serif; color: oklch(50% 0.02 55);\">Nice work showing up for yourself. See you tomorrow.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- WEEKLY SCREEN -->\n    <sc-if value=\"{{ isWeekly }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Weekly\" style=\"flex: 1; overflow-y: auto; padding: 32px 24px 24px;\">\n        <div style=\"font: 600 26px/1.2 'Fredoka', sans-serif; color: oklch(28% 0.02 50);\">This week<\u002Fdiv>\n        <div style=\"font: 400 14px/1.4 'Inter', sans-serif; color: oklch(55% 0.02 55); margin-top: 4px;\">{{ weekRangeLabel }}<\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 18px; margin-top: 24px;\">\n          <sc-for list=\"{{ weeklyHabits }}\" as=\"habit\" hint-placeholder-count=\"4\">\n            <div style=\"background: oklch(98.5% 0.006 75); border: 1px solid oklch(91% 0.012 75); border-radius: 20px; padding: 18px 18px 16px;\">\n              <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n                <div style=\"{{ habit.dotStyle }}\"><\u002Fdiv>\n                <div style=\"font: 600 15px 'Fredoka', sans-serif; color: oklch(28% 0.02 50); flex: 1;\">{{ habit.name }}<\u002Fdiv>\n                <div style=\"font: 500 12.5px 'Inter', sans-serif; color: oklch(46% 0.08 150);\">{{ habit.streakLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; justify-content: space-between; gap: 6px;\">\n                <sc-for list=\"{{ habit.week }}\" as=\"day\" hint-placeholder-count=\"7\">\n                  <div style=\"display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1;\">\n                    <div style=\"font: 500 11px 'Inter', sans-serif; color: oklch(60% 0.02 55);\">{{ day.label }}<\u002Fdiv>\n                    <div style=\"{{ day.dotStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 22px; padding: 18px; background: oklch(93% 0.035 150); border-radius: 18px; font: 400 13.5px/1.6 'Inter', sans-serif; color: oklch(35% 0.03 130); text-align: center;\">\n          {{ weeklyEncouragement }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- NEW HABIT WIZARD -->\n    <sc-if value=\"{{ isNew }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"New Habit\" style=\"flex: 1; overflow-y: auto; padding: 28px 24px 24px; display: flex; flex-direction: column;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;\">\n          <button onclick=\"{{ cancelWizard }}\" style=\"width: 36px; height: 36px; border-radius: 12px; border: none; background: oklch(93% 0.012 75); color: oklch(40% 0.02 55); font: 600 16px 'Inter', sans-serif; cursor: pointer;\">✕<\u002Fbutton>\n          <div style=\"font: 500 13px 'Inter', sans-serif; color: oklch(55% 0.02 55);\">{{ stepLabel }}<\u002Fdiv>\n          <div style=\"width: 36px;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; gap: 6px; margin: 18px 0 26px;\">\n          <sc-for list=\"{{ stepDots }}\" as=\"dot\" hint-placeholder-count=\"3\">\n            <div style=\"{{ dot.style }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- STEP 1: NAME -->\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font: 600 22px 'Fredoka', sans-serif; color: oklch(28% 0.02 50); margin-bottom: 8px;\">What habit would you like to build?<\u002Fdiv>\n          <div style=\"font: 400 14px/1.5 'Inter', sans-serif; color: oklch(55% 0.02 55); margin-bottom: 20px;\">Pick something small and specific — it's easier to keep going.<\u002Fdiv>\n          <input type=\"text\" placeholder=\"e.g. Drink a glass of water\" value=\"{{ draftName }}\" onchange=\"{{ updateDraftName }}\" style=\"width: 100%; padding: 16px 18px; border-radius: 16px; border: 1.5px solid oklch(88% 0.012 75); background: white; font: 500 16px 'Inter', sans-serif; color: oklch(28% 0.02 50); outline: none;\" style-focus=\"border-color: oklch(58% 0.08 150);\">\n        <\u002Fsc-if>\n\n        <!-- STEP 2: SCHEDULE -->\n        <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font: 600 22px 'Fredoka', sans-serif; color: oklch(28% 0.02 50); margin-bottom: 8px;\">When should this happen?<\u002Fdiv>\n          <div style=\"font: 400 14px/1.5 'Inter', sans-serif; color: oklch(55% 0.02 55); margin-bottom: 18px;\">Choose the days that work for you.<\u002Fdiv>\n          <button onclick=\"{{ selectEveryDay }}\" style=\"{{ everyDayStyle }}\">Every day<\u002Fbutton>\n          <div style=\"display: flex; gap: 8px; margin-top: 14px;\">\n            <sc-for list=\"{{ dayOptions }}\" as=\"day\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ day.toggle }}\" style=\"{{ day.style }}\">{{ day.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 3: REMINDER -->\n        <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font: 600 22px 'Fredoka', sans-serif; color: oklch(28% 0.02 50); margin-bottom: 8px;\">When's a good time to remind you?<\u002Fdiv>\n          <div style=\"font: 400 14px/1.5 'Inter', sans-serif; color: oklch(55% 0.02 55); margin-bottom: 18px;\">A gentle nudge — you can always change this later.<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <sc-for list=\"{{ presetOptions }}\" as=\"preset\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ preset.select }}\" style=\"{{ preset.style }}\">\n                <span>{{ preset.label }}<\u002Fspan>\n                <span style=\"font: 400 13px 'Inter', sans-serif; opacity: 0.7;\">{{ preset.sublabel }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showCustomTime }}\" hint-placeholder-val=\"{{ false }}\">\n            <input type=\"time\" value=\"{{ customTime }}\" onchange=\"{{ updateCustomTime }}\" style=\"margin-top: 14px; width: 100%; padding: 14px 18px; border-radius: 16px; border: 1.5px solid oklch(88% 0.012 75); background: white; font: 500 16px 'Inter', sans-serif; color: oklch(28% 0.02 50); outline: none;\">\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <div style=\"flex: 1;\"><\u002Fdiv>\n\n        <div style=\"display: flex; gap: 10px; margin-top: 20px;\">\n          <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ goBack }}\" style=\"flex: 0 0 auto; padding: 16px 22px; border-radius: 16px; border: 1.5px solid oklch(88% 0.012 75); background: white; color: oklch(40% 0.02 55); font: 600 15px 'Inter', sans-serif; cursor: pointer;\">Back<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ primaryAction }}\" disabled=\"{{ primaryDisabled }}\" style=\"{{ primaryButtonStyle }}\">{{ primaryLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- BOTTOM NAV -->\n    <div style=\"display: flex; align-items: center; justify-content: space-around; padding: 12px 20px 18px; border-top: 1px solid oklch(91% 0.012 75); background: oklch(98.5% 0.006 75); flex-shrink: 0;\">\n      <sc-for list=\"{{ navItems }}\" as=\"nav\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ nav.onClick }}\" style=\"display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px 18px;\">\n          <div style=\"{{ nav.iconStyle }}\"><\u002Fdiv>\n          <div style=\"{{ nav.labelStyle }}\">{{ nav.label }}<\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst WEEKDAY_LABELS = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];\nconst WEEKDAY_FULL = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];\nconst GREEN = 150;\n\nfunction formatTime24to12(hhmm) {\n  if (!hhmm) return '';\n  const [h, m] = hhmm.split(':').map(Number);\n  const period = h >= 12 ? 'PM' : 'AM';\n  let hour = h % 12;\n  if (hour === 0) hour = 12;\n  return hour + ':' + String(m).padStart(2, '0') + ' ' + period;\n}\n\nfunction scheduleLabel(days) {\n  if (days.every(d => d)) return 'Every day';\n  const picked = days.map((d, i) => d ? WEEKDAY_FULL[i] : null).filter(Boolean);\n  if (picked.length === 0) return 'No days set';\n  return picked.join(', ');\n}\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'today',\n    habits: [\n      { id: 1, name: 'Drink water', hue: 145, timeLabel: '8:00 AM', streak: 12, history: [true, true, true, true, true, true, false] },\n      { id: 2, name: 'Morning walk', hue: 150, timeLabel: '7:30 AM', streak: 4, history: [false, true, true, true, true, true, true] },\n      { id: 3, name: 'Read 10 pages', hue: 160, timeLabel: '9:00 PM', streak: 21, history: [true, true, false, true, true, true, true] },\n      { id: 4, name: 'Stretch', hue: 132, timeLabel: '6:30 AM', streak: 2, history: [false, false, true, true, false, true, false] },\n    ],\n    wizardStep: 1,\n    draft: { name: '', days: [false, false, false, false, false, false, false], reminderPreset: null, customTime: '' },\n    justCompletedId: null,\n  };\n\n  setScreen = (s) => this.setState({ screen: s });\n\n  startNewHabit = () => this.setState({\n    screen: 'new',\n    wizardStep: 1,\n    draft: { name: '', days: [false, false, false, false, false, false, false], reminderPreset: null, customTime: '' },\n  });\n\n  cancelWizard = () => this.setState({ screen: 'today' });\n\n  toggleComplete = (id) => {\n    this.setState(s => ({\n      habits: s.habits.map(h => {\n        if (h.id !== id) return h;\n        const hist = h.history.slice();\n        const wasDone = hist[6];\n        hist[6] = !wasDone;\n        return { ...h, history: hist, streak: wasDone ? Math.max(0, h.streak - 1) : h.streak + 1 };\n      }),\n      justCompletedId: id,\n    }));\n    setTimeout(() => this.setState(s => s.justCompletedId === id ? { justCompletedId: null } : {}), 450);\n  };\n\n  updateDraftName = (e) => {\n    const val = e.target.value;\n    this.setState(s => ({ draft: { ...s.draft, name: val } }));\n  };\n\n  toggleDay = (index) => {\n    this.setState(s => {\n      const days = s.draft.days.slice();\n      days[index] = !days[index];\n      return { draft: { ...s.draft, days } };\n    });\n  };\n\n  selectEveryDay = () => {\n    this.setState(s => ({ draft: { ...s.draft, days: [true, true, true, true, true, true, true] } }));\n  };\n\n  selectPreset = (preset) => {\n    this.setState(s => ({ draft: { ...s.draft, reminderPreset: preset } }));\n  };\n\n  updateCustomTime = (e) => {\n    const val = e.target.value;\n    this.setState(s => ({ draft: { ...s.draft, customTime: val } }));\n  };\n\n  goNext = () => this.setState(s => ({ wizardStep: s.wizardStep + 1 }));\n  goBack = () => this.setState(s => ({ wizardStep: s.wizardStep - 1 }));\n\n  createHabit = () => {\n    const d = this.state.draft;\n    let timeLabel;\n    if (d.reminderPreset === 'Morning') timeLabel = '7:00 AM';\n    else if (d.reminderPreset === 'Afternoon') timeLabel = '1:00 PM';\n    else if (d.reminderPreset === 'Evening') timeLabel = '7:00 PM';\n    else timeLabel = formatTime24to12(d.customTime) || 'No reminder';\n\n    const hues = [145, 150, 160, 132, 140, 155];\n    const newHabit = {\n      id: Date.now(),\n      name: d.name.trim(),\n      hue: hues[this.state.habits.length % hues.length],\n      timeLabel,\n      streak: 0,\n      history: d.days.slice(),\n    };\n    newHabit.history[6] = false;\n    this.setState(s => ({ habits: [...s.habits, newHabit], screen: 'today' }));\n  };\n\n  renderVals() {\n    const s = this.state;\n    const today = new Date();\n    const hour = today.getHours();\n    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';\n    const todayDateLabel = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });\n\n    const habits = s.habits.map(h => {\n      const done = h.history[6];\n      const bounce = s.justCompletedId === h.id ? 'animation: bounceCheck 0.4s ease;' : '';\n      return {\n        id: h.id,\n        name: h.name,\n        initial: h.name.trim().charAt(0).toUpperCase(),\n        timeLabel: h.timeLabel,\n        streakLabel: h.streak === 0 ? 'New habit' : h.streak + ' day streak',\n        checkMark: done ? '✓' : '',\n        toggle: () => this.toggleComplete(h.id),\n        cardStyle: `display:flex; align-items:center; gap:14px; padding:16px; border-radius:20px; background:${done ? `oklch(96% 0.02 ${h.hue})` : 'oklch(98.5% 0.006 75)'}; border:1px solid ${done ? `oklch(88% 0.03 ${h.hue})` : 'oklch(91% 0.012 75)'}; transition: background 0.25s ease, border-color 0.25s ease;`,\n        iconStyle: `width:42px; height:42px; border-radius:14px; background:oklch(90% 0.045 ${h.hue}); color:oklch(38% 0.06 ${h.hue}); display:flex; align-items:center; justify-content:center; font:600 16px 'Fredoka', sans-serif; flex-shrink:0;`,\n        nameStyle: `font:600 15.5px 'Fredoka', sans-serif; color:oklch(28% 0.02 50); ${done ? 'text-decoration: line-through; text-decoration-color: oklch(70% 0.03 ' + h.hue + ');' : ''}`,\n        checkStyle: `width:44px; height:44px; border-radius:50%; flex-shrink:0; cursor:pointer; border:2px solid ${done ? `oklch(58% 0.08 ${h.hue})` : 'oklch(85% 0.015 75)'}; background:${done ? `oklch(58% 0.08 ${h.hue})` : 'white'}; color:white; font:700 18px sans-serif; display:flex; align-items:center; justify-content:center; ${bounce}`,\n      };\n    });\n\n    const doneCount = habits.filter(h => h.checkMark === '✓').length;\n    const totalCount = habits.length;\n    const allDone = totalCount > 0 && doneCount === totalCount;\n    const progressMessage = allDone\n      ? \"You've completed every habit today.\"\n      : doneCount === 0\n        ? `${totalCount} habit${totalCount === 1 ? '' : 's'} waiting for you today.`\n        : `${doneCount} of ${totalCount} done — keep going.`;\n\n    const weekDates = [];\n    for (let i = 0; i < 7; i++) {\n      const d = new Date(today);\n      d.setDate(today.getDate() - (6 - i));\n      weekDates.push(d);\n    }\n    const weekRangeLabel = weekDates[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' + weekDates[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });\n\n    const weeklyHabits = s.habits.map(h => ({\n      name: h.name,\n      streakLabel: h.streak === 0 ? 'New' : h.streak + ' day streak',\n      dotStyle: `width:9px; height:9px; border-radius:50%; background:oklch(60% 0.07 ${h.hue}); flex-shrink:0;`,\n      week: h.history.map((done, i) => ({\n        label: WEEKDAY_LABELS[i],\n        dotStyle: `width:30px; height:30px; border-radius:10px; background:${done ? `oklch(60% 0.08 ${h.hue})` : 'oklch(93% 0.012 75)'}; ${i === 6 ? `box-shadow: 0 0 0 2px oklch(98.5% 0.006 75), 0 0 0 3.5px oklch(60% 0.08 ${h.hue});` : ''}`,\n      })),\n    }));\n\n    const weekDoneTotal = s.habits.reduce((sum, h) => sum + h.history.filter(Boolean).length, 0);\n    const weekPossible = s.habits.length * 7;\n    const weeklyEncouragement = weekDoneTotal >= weekPossible * 0.7\n      ? \"Strong week — you're building real momentum.\"\n      : \"Every check-in counts, even the small ones. Keep at your own pace.\";\n\n    const draft = s.draft;\n    const dayOptions = draft.days.map((selected, i) => ({\n      label: WEEKDAY_LABELS[i],\n      toggle: () => this.toggleDay(i),\n      style: `width:40px; height:40px; border-radius:12px; border:1.5px solid ${selected ? 'oklch(58% 0.08 150)' : 'oklch(88% 0.012 75)'}; background:${selected ? 'oklch(58% 0.08 150)' : 'white'}; color:${selected ? 'white' : 'oklch(40% 0.02 55)'}; font:600 13px 'Inter', sans-serif; cursor:pointer;`,\n    }));\n    const everyDayStyle = `width:100%; padding:14px; border-radius:16px; border:1.5px solid ${draft.days.every(d => d) ? 'oklch(58% 0.08 150)' : 'oklch(88% 0.012 75)'}; background:${draft.days.every(d => d) ? 'oklch(93% 0.035 150)' : 'white'}; color:${draft.days.every(d => d) ? 'oklch(40% 0.08 150)' : 'oklch(40% 0.02 55)'}; font:600 14.5px 'Inter', sans-serif; cursor:pointer; text-align:center;`;\n\n    const presetDefs = [\n      { key: 'Morning', label: 'Morning', sublabel: '7:00 AM' },\n      { key: 'Afternoon', label: 'Afternoon', sublabel: '1:00 PM' },\n      { key: 'Evening', label: 'Evening', sublabel: '7:00 PM' },\n      { key: 'Custom', label: 'Custom time', sublabel: 'Pick your own' },\n    ];\n    const presetOptions = presetDefs.map(p => {\n      const selected = draft.reminderPreset === p.key;\n      return {\n        label: p.label,\n        sublabel: p.sublabel,\n        select: () => this.selectPreset(p.key),\n        style: `width:100%; padding:15px 18px; border-radius:16px; border:1.5px solid ${selected ? 'oklch(58% 0.08 150)' : 'oklch(88% 0.012 75)'}; background:${selected ? 'oklch(93% 0.035 150)' : 'white'}; color:${selected ? 'oklch(38% 0.08 150)' : 'oklch(30% 0.02 50)'}; font:600 15px 'Inter', sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:space-between; text-align:left;`,\n      };\n    });\n\n    const isStep1 = s.wizardStep === 1;\n    const isStep2 = s.wizardStep === 2;\n    const isStep3 = s.wizardStep === 3;\n    const stepLabels = ['Name', 'Schedule', 'Reminder'];\n    const stepDots = [1, 2, 3].map(n => ({\n      style: `flex:1; height:5px; border-radius:3px; background:${n <= s.wizardStep ? 'oklch(58% 0.08 150)' : 'oklch(90% 0.012 75)'};`,\n    }));\n\n    const canProceedStep1 = draft.name.trim().length > 0;\n    const canProceedStep2 = draft.days.some(d => d);\n    const canProceedStep3 = draft.reminderPreset && (draft.reminderPreset !== 'Custom' || draft.customTime);\n\n    let primaryLabel, primaryAction, primaryDisabled;\n    if (isStep1) { primaryLabel = 'Next'; primaryAction = this.goNext; primaryDisabled = !canProceedStep1; }\n    else if (isStep2) { primaryLabel = 'Next'; primaryAction = this.goNext; primaryDisabled = !canProceedStep2; }\n    else { primaryLabel = 'Create habit'; primaryAction = this.createHabit; primaryDisabled = !canProceedStep3; }\n\n    const primaryButtonStyle = `flex:1; padding:16px 22px; border-radius:16px; border:none; background:${primaryDisabled ? 'oklch(90% 0.012 75)' : 'oklch(58% 0.08 150)'}; color:${primaryDisabled ? 'oklch(65% 0.01 75)' : 'white'}; font:600 15.5px 'Inter', sans-serif; cursor:${primaryDisabled ? 'default' : 'pointer'};`;\n\n    const navItems = [\n      { key: 'today', label: 'Today', onClick: () => this.setScreen('today') },\n      { key: 'weekly', label: 'Weekly', onClick: () => this.setScreen('weekly') },\n      { key: 'new', label: 'Add', onClick: this.startNewHabit },\n    ].map(n => {\n      const active = s.screen === n.key || (n.key === 'new' && s.screen === 'new');\n      let iconStyle;\n      if (n.key === 'today') iconStyle = `width:20px; height:20px; border-radius:50%; background:${active ? 'oklch(58% 0.08 150)' : 'none'}; border:2px solid ${active ? 'oklch(58% 0.08 150)' : 'oklch(65% 0.015 60)'};`;\n      else if (n.key === 'weekly') iconStyle = `width:20px; height:14px; background: linear-gradient(to top, ${active ? 'oklch(58% 0.08 150)' : 'oklch(65% 0.015 60)'} 60%, transparent 60%) no-repeat; background-size: 4px 100%, 4px 70%, 4px 100%; background-position: 0 bottom, 8px bottom, 16px bottom; background-repeat: no-repeat;`;\n      else iconStyle = `width:20px; height:20px; position:relative;`;\n      return {\n        label: n.label,\n        onClick: n.onClick,\n        iconStyle,\n        labelStyle: `font:600 11px 'Inter', sans-serif; color:${active ? 'oklch(46% 0.08 150)' : 'oklch(60% 0.015 60)'};`,\n      };\n    });\n\n    return {\n      isToday: s.screen === 'today',\n      isWeekly: s.screen === 'weekly',\n      isNew: s.screen === 'new',\n      greeting, todayDateLabel,\n      startNewHabit: this.startNewHabit,\n      progressFraction: doneCount + '/' + totalCount,\n      progressMessage,\n      habits,\n      allDone,\n      weekRangeLabel,\n      weeklyHabits,\n      weeklyEncouragement,\n      cancelWizard: this.cancelWizard,\n      stepLabel: 'Step ' + s.wizardStep + ' of 3: ' + stepLabels[s.wizardStep - 1],\n      stepDots,\n      isStep1, isStep2, isStep3,\n      draftName: draft.name,\n      updateDraftName: this.updateDraftName,\n      dayOptions,\n      everyDayStyle,\n      selectEveryDay: this.selectEveryDay,\n      presetOptions,\n      showCustomTime: draft.reminderPreset === 'Custom',\n      customTime: draft.customTime,\n      updateCustomTime: this.updateCustomTime,\n      showBack: s.wizardStep > 1,\n      goBack: this.goBack,\n      primaryAction, primaryLabel, primaryDisabled, primaryButtonStyle,\n      navItems,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
