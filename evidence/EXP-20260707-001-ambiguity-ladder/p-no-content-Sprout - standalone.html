document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tton onclick=\"{{ goSettings }}\" style=\"{{ navSettingsStyle }}\">Settings<\u002Fbutton>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto; padding:16px 14px; border-radius:16px; background:#FAF8F3; border:1px solid #E6E1D3;\">\n      <div style=\"font-family:'Nunito',sans-serif; font-weight:700; font-size:13px; color:#33342E; margin-bottom:4px;\">A gentle reminder<\u002Fdiv>\n      <div style=\"font-size:12.5px; line-height:1.5; color:#6B6C63;\">Missing a day doesn't erase the ones you showed up for. Just pick back up whenever you're ready.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <main style=\"flex:1; min-width:0; padding:{{ mainPadding }}; max-width:920px;\">\n\n    <!-- TODAY VIEW -->\n    <sc-if value=\"{{ isToday }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"margin-bottom:{{ sectionGap }};\">\n          <div style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:30px; color:#232420;\">{{ greeting }}<\u002Fdiv>\n          <div style=\"font-size:14.5px; color:#8B8C80; margin-top:6px;\">{{ dateLabel }} · small steps, counted kindly<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:{{ cardGap }};\">\n          <sc-for list=\"{{ habits }}\" as=\"h\" hint-placeholder-count=\"5\">\n            <div style=\"{{ h.cardStyle }}\">\n              <div style=\"{{ h.avatarStyle }}\">\n                <sc-if value=\"{{ h.isCircle }}\"><div style=\"width:14px; height:14px; border-radius:50%; background:{{ h.dotColor }};\"><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ h.isRect }}\"><div style=\"width:8px; height:16px; border-radius:2px; background:{{ h.dotColor }};\"><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ h.isRing }}\"><div style=\"width:16px; height:16px; border-radius:50%; border:3.5px solid {{ h.dotColor }};\"><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ h.isDouble }}\">\n                  <div style=\"display:flex; gap:2px;\">\n                    <div style=\"width:9px; height:9px; border-radius:50%; background:{{ h.dotColor }};\"><\u002Fdiv>\n                    <div style=\"width:9px; height:9px; border-radius:50%; background:{{ h.dotColor }};\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ h.isDiamond }}\"><div style=\"width:12px; height:12px; background:{{ h.dotColor }}; transform:rotate(45deg); border-radius:2px;\"><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"flex:1; min-width:0; cursor:pointer;\" onclick=\"{{ h.openDetail }}\">\n                <div style=\"font-family:'Nunito',sans-serif; font-weight:700; font-size:15.5px; color:#2C2D27;\">{{ h.name }}<\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#9A9B8F; margin-top:2px;\">{{ h.metaLine }}<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex; gap:5px; flex:none;\">\n                <sc-for list=\"{{ h.weekDots }}\" as=\"d\" hint-placeholder-count=\"7\">\n                  <div style=\"{{ d.dotStyle }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"flex:none; width:130px; text-align:right; font-size:12.5px; color:#8B8C80;\">{{ h.statusText }}<\u002Fdiv>\n\n              <sc-if value=\"{{ h.isActiveToday }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ h.toggle }}\" style=\"{{ h.checkStyle }}\">\n                  <sc-if value=\"{{ h.done }}\"><div style=\"width:9px; height:6px; border-left:2.5px solid #fff; border-bottom:2.5px solid #fff; transform:rotate(-45deg) translate(1px,-1px);\"><\u002Fdiv><\u002Fsc-if>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ h.isRestDay }}\">\n                <div style=\"flex:none; width:44px; font-size:11px; text-align:center; color:#B7B8AC; font-style:italic;\">rest<\u002Fdiv>\n              <\u002 -placeholder-count=\"7\">\n                <div style=\"display:flex; justify-content:center;\"><div style=\"{{ d.gridDotStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SETTINGS VIEW -->\n    <sc-if value=\"{{ isSettings }}\">\n      <div>\n        <div style=\"margin-bottom:22px;\">\n          <div style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:30px; color:#232420;\">Settings<\u002Fdiv>\n          <div style=\"font-size:14.5px; color:#8B8C80; margin-top:6px;\">A few things, kept simple.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:14px; max-width:460px;\">\n          <div style=\"background:#fff; border:1px solid #ECE8DA; border-radius:16px; padding:18px 20px;\">\n            <label style=\"font-size:12.5px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:8px;\">Your name<\u002Flabel>\n            <input value=\"{{ name }}\" onchange=\"{{ setName }}\" style=\"width:100%; border:1px solid #E6E1D3; border-radius:10px; padding:10px 12px; font-size:14.5px; font-family:'Inter',sans-serif; color:#2C2D27; outline:none; background:#FAF8F3;\">\n          <\u002Fdiv>\n\n          <div style=\"background:#fff; border:1px solid #ECE8DA; border-radius:16px; padding:6px 20px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid #F1EEE3;\">\n              <div>\n                <div style=\"font-size:14px; font-weight:600; color:#2C2D27;\">Daily reminders<\u002Fdiv>\n                <div style=\"font-size:12px; color:#9A9B8F; margin-top:2px;\">A soft nudge, never a scold.<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ toggleReminder }}\" style=\"{{ reminderToggleStyle }}\"><div style=\"{{ reminderThumbStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; padding:14px 0;\">\n              <div>\n                <div style=\"font-size:14px; font-weight:600; color:#2C2D27;\">Weekly recap email<\u002Fdiv>\n                <div style=\"font-size:12px; color:#9A9B8F; margin-top:2px;\">A warm summary every Sunday.<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ toggleWeeklyEmail }}\" style=\"{{ weeklyToggleStyle }}\"><div style=\"{{ weeklyThumbStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff; border:1px solid #ECE8DA; border-radius:16px; padding:8px 8px;\">\n            <div style=\"font-size:12.5px; font-weight:700; color:#9A9B8F; padding:10px 12px 4px;\">Manage habits<\u002Fdiv>\n            <sc-for list=\"{{ habits }}\" as=\"h\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex; align-items:center; gap:12px; padding:10px 12px;\">\n                <div style=\"{{ h.miniAvatarStyle }}\"><\u002Fdiv>\n                <div style=\"flex:1; font-size:13.5px; font-weight:600; color:#2C2D27;\">{{ h.name }}<\u002Fdiv>\n                <button onclick=\"{{ h.openEdit }}\" style=\"border:none; background:transparent; color:#9A9B8F; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;\">Edit<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- ADD/EDIT MODAL -->\n  <sc-if value=\"{{ modalOpen }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(40,38,30,0.28); display:flex; align-items:center; justify-content:center; z-index:50;\" onclick=\"{{ closeModal }}\">\n      <div style=\"background:#FAF8F3; border-radius:22px; width:420px; max-width:92vw; padding:26px 26px 22px; box-shadow:0 20px 60px rgba(30,28,20,0.18);\" onclick=\"{{ stopClick }}\">\n        <div style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:19px; color:#232420; margin-bottom:18px;\">{{ modalTitle }}<\u002Fdiv>\n\n        <label style=\"font-size:12px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:6px;\">What's the habit?<\u002Flabel>\n        <input value=\"{{ draftName }}\" onchange=\"{{ setDraftName }}\" placeholder=\"e.g. Read a bedtime story\" style=\"width:100%; border:1px solid #E6E1D3; border-radius:10px; padding:11px 13px; font-size:14.5px; font-family:'Inter',sans-serif; color:#2C2D27; outline:none; background:#fff; margin-bottom:16px;\">\n\n        <label style=\"font-size:12px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:8px;\">Pick a color<\u002Flabel>\n        <div style=\"display:flex; gap:10px; margin-bottom:16px;\">\n          <sc-for list=\"{{ hueOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ opt.select }}\" style=\"{{ opt.swatchStyle }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <label style=\"font-size:12px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:8px;\">How often?<\u002Flabel>\n        <div style=\"display:flex; gap:8px; margin-bottom:16px;\">\n          <button onclick=\"{{ setFreqDaily }}\" style=\"{{ freqDailyStyle }}\">Every day<\u002Fbutton>\n          <button onclick=\"{{ setFreqWeekdays }}\" style=\"{{ freqWeekdaysStyle }}\">Weekdays<\u002Fbutton>\n        <\u002Fdiv>\n\n        <label style=\"font-size:12px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:6px;\">Reminder time (optional)<\u002Flabel>\n        <input type=\"time\" value=\"{{ draftReminder }}\" onchange=\"{{ setDraftReminder }}\" style=\"border:1px solid #E6E1D3; border-radius:10px; padding:9px 12px; font-size:14px; font-family:'Inter',sans-serif; color:#2C2D27; outline:none; background:#fff; margin-bottom:22px;\">\n\n        <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n          <sc-if value=\"{{ isEditing }}\">\n            <button onclick=\"{{ deleteDraft }}\" style=\"border:none; background:transparent; color:#9A9B8F; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;\">Remove habit<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isEditingFalse }}\"><div><\u002Fdiv><\u002Fsc-if>\n          <div style=\"display:flex; gap:10px; margin-left:auto;\">\n            <button onclick=\"{{ closeModal }}\" style=\"border:none; background:transparent; color:#6B6C63; font-size:13.5px; font-weight:600; cursor:pointer; padding:10px 6px; font-family:'Inter',sans-serif;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveHabit }}\" style=\"border:none; background:{{ accentMid }}; color:#fff; font-size:13.5px; font-weight:700; cursor:pointer; padding:10px 20px; border-radius:12px; font-family:'Inter',sans-serif;\">Save<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DETAIL MODAL -->\n  <sc-if value=\"{{ detailOpen }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(40,38,30,0.28); display:flex; align-items:center; justify-content:center; z-index:50;\" onclick=\"{{ closeDetail }}\">\n      <div style=\"background:#FAF8F3; border-radius:22px; width:460px; max-width:92vw; padding:26px 26px 22px; box-shadow:0 20px 60px rgba(30,28,20,0.18);\" onclick=\"{{ stopClick }}\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\">\n          <div style=\"{{ detailAvatarStyle }}\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Nunito',sans-serif; font-weight:800; font-size:18px; color:#232420;\">{{ detailName }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#9A9B8F;\">{{ detailMetaLine }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:14px 16px; border-radius:14px; background:{{ accentLight }}; color:{{ accentDark }}; font-size:13.5px; font-weight:600; line-height:1.5; margin-bottom:18px;\">{{ detailStatLine }}<\u002Fdiv>\n\n        <label style=\"font-size:12px; font-weight:700; color:#9A9B8F; display:block; margin-bottom:8px;\">Last five weeks<\u002Flabel>\n        <div style=\"display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; margin-bottom:20px;\">\n          <sc-for list=\"{{ detailGrid }}\" as=\"c\" hint-placeholder-count=\"35\">\n            <div style=\"{{ c.cellStyle }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:flex-end; gap:10px;\">\n          <button onclick=\"{{ closeDetail }}\" style=\"border:none; background:transparent; color:#6B6C63; font-size:13.5px; font-weight:600; cursor:pointer; padding:10px 6px; font-family:'Inter',sans-serif;\">Close<\u002Fbutton>\n          <button onclick=\"{{ editFromDetail }}\" style=\"border:none; background:{{ accentMid }}; color:#fff; font-size:13.5px; font-weight:700; cursor:pointer; padding:10px 20px; border-radius:12px; font-family:'Inter',sans-serif;\">Edit habit<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- CELEBRATION TOAST -->\n  <sc-if value=\"{{ celebration }}\">\n    <div style=\"position:fixed; bottom:28px; right:28px; background:{{ accentMid }}; color:#fff; padding:14px 20px; border-radius:14px; font-size:13.5px; font-weight:600; font-family:'Inter',sans-serif; box-shadow:0 10px 30px rgba(30,28,20,0.22); animation:sprout-toast-in 0.35s ease; z-index:60;\">{{ celebration }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 860}, &quot;streakStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;words&quot;, &quot;options&quot;: [&quot;words&quot;, &quot;numbers&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;density&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;cozy&quot;, &quot;options&quot;: [&quot;cozy&quot;, &quot;compact&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: [&quot;#EAF0E7&quot;, &quot;#6E8F72&quot;, &quot;#3F5B44&quot;], &quot;options&quot;: [[&quot;#EAF0E7&quot;, &quot;#6E8F72&quot;, &quot;#3F5B44&quot;], [&quot;#E4ECE2&quot;, &quot;#5A7A5C&quot;, &quot;#33472F&quot;], [&quot;#E4EEEC&quot;, &quot;#5E8783&quot;, &quot;#33504C&quot;]], &quot;tsType&quot;: &quot;string[]&quot;, &quot;section&quot;: &quot;Behavior&quot;}}\">\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const today = new Date();\n    today.setHours(0,0,0,0);\n\n    const mk = (offset) => {\n      const d = new Date(today);\n      d.setDate(d.getDate() - offset);\n      return this.dateKey(d);\n    };\n\n    this.state = {\n      view: 'today',\n      today,\n      name: 'Alex',\n      reminderOn: true,\n      weeklyEmailOn: false,\n      modalOpen: false,\n      editingHabitId: null,\n      draftName: '',\n      draftHue: 150,\n      draftFrequency: 'daily',\n      draftReminder: '',\n      detailHabitId: null,\n      celebration: null,\n      habits: [\n        { id: 1, name: 'Read a bedtime story', hue: 50, shape: 'rect', frequency: 'daily', reminderTime: '19:30',\n          completedDates: [mk(1), mk(2), mk(4), mk(5), mk(6)] },\n        { id: 2, name: 'Drink water before coffee', hue: 230, shape: 'circle', frequency: 'daily', reminderTime: '',\n          completedDates: [mk(1), mk(2), mk(3), mk(5), mk(6)] },\n        { id: 3, name: 'Stretch for 5 minutes', hue: 150, shape: 'ring', frequency: 'daily', reminderTime: '07:00',\n          completedDates: [mk(2), mk(4), mk(6)] },\n        { id: 4, name: 'Family dinner, phones away', hue: 320, shape: 'double', frequency: 'weekdays', reminderTime: '18:00',\n          completedDates: [mk(1), mk(2), mk(3), mk(4)] },\n        { id: 5, name: 'Tidy the kitchen, 5 min', hue: 90, shape: 'diamond', frequency: 'daily', reminderTime: '',\n          completedDates: [mk(1), mk(3), mk(5), mk(6)] },\n      ],\n    };\n  }\n\n  dateKey(d) { return d.toISOString().slice(0,10); }\n\n  colorFor(hue, light) {\n    if (light === 'light') return `oklch(94% 0.035 ${hue})`;\n    if (light === 'dark') return `oklch(38% 0.08 ${hue})`;\n    return `oklch(60% 0.1 ${hue})`;\n  }\n\n  last7(today) {\n    const arr = [];\n    for (let i = 6; i >= 0; i--) {\n      const d = new Date(today);\n      d.setDate(d.getDate() - i);\n      arr.push(d);\n    }\n    return arr;\n  }\n\n  isActiveOn(habit, d) {\n    if (habit.frequency !== 'weekdays') return true;\n    const day = d.getDay();\n    return day !== 0 && day !== 6;\n  }\n\n  toggleToday(id) {\n    const key = this.dateKey(this.state.today);\n    const habits = this.state.habits.map(h => {\n      if (h.id !== id) return h;\n      const has = h.completedDates.includes(key);\n      const completedDates = has ? h.completedDates.filter(k => k !== key) : [...h.completedDates, key];\n      return { ...h, completedDates };\n    });\n    const justCompleted = !this.state.habits.find(h => h.id === id).completedDates.includes(key);\n    this.setState({ habits });\n    if (justCompleted) {\n      const msgs = [\n        'Nice — that\\'s done for today.',\n        'Showed up again. That counts.',\n        'Small step, taken. Well done.',\n        'Logged. Keep it easy on yourself.',\n      ];\n      const msg = msgs[Math.floor(Math.random() * msgs.length)];\n      this.setState({ celebration: msg });\n      clearTimeout(this._toastTimer);\n      this._toastTimer = setTimeout(() => this.setState({ celebration: null }), 2600);\n    }\n  }\n\n  openAdd() {\n    this.setState({ modalOpen: true, editingHabitId: null, draftName: '', draftHue: 150, draftFrequency: 'daily', draftReminder: '' });\n  }\n\n  openEdit(habit) {\n    this.setState({ modalOpen: true, editingHabitId: habit.id, draftName: habit.name, draftHue: habit.hue, draftFrequency: habit.frequency, draftReminder: habit.reminderTime, detailHabitId: null });\n  }\n\n  saveHabit() {\n    const { editingHabitId, draftName, draftHue, draftFrequency, draftReminder } = this.state;\n    const shapeFor = (hue) => ({150:'ring',50:'rect',230:'circle',320:'double',90:'diamond'}[hue] || 'circle');\n    if (!draftName.trim()) { this.setState({ modalOpen: false }); return; }\n    if (editingHabitId == null) {\n      const newHabit = { id: Date.now(), name: draftName.trim(), hue: draftHue, shape: shapeFor(draftHue), frequency: draftFrequency, reminderTime: draftReminder, completedDates: [] };\n      this.setState({ habits: [...this.state.habits, newHabit], modalOpen: false });\n    } else {\n      const habits = this.state.habits.map(h => h.id === editingHabitId ? { ...h, name: draftName.trim(), hue: draftHue, shape: shapeFor(draftHue), frequency: draftFrequency, reminderTime: draftReminder } : h);\n      this.setState({ habits, modalOpen: false });\n    }\n  }\n\n  deleteDraft() {\n    const { editingHabitId } = this.state;\n    this.setState({ habits: this.state.habits.filter(h => h.id !== editingHabitId), modalOpen: false });\n  }\n\n  renderVals() {\n    const { view, today, habits, name, reminderOn, weeklyEmailOn, modalOpen, editingHabitId, draftName, draftHue, draftFrequency, draftReminder, detailHabitId, celebration } = this.state;\n\n    const streakStyle = this.props.streakStyle ?? 'words';\n    const density = this.props.density ?? 'cozy';\n    const palette = this.props.accent ?? ['#EAF0E7', '#6E8F72', '#3F5B44'];\n    const accentLight = palette[0], accentMid = palette[1], accentDark = palette[2];\n\n    const mainPadding = density === 'compact' ? '28px 36px' : '40px 52px';\n    const sectionGap = density === 'compact' ? '18px' : '28px';\n    const cardGap = density === 'compact' ? '8px' : '12px';\n\n    const navStyle = (active) => `text-align:left; border:none; background:${active ? '#fff' : 'transparent'}; color:${active ? '#2C2D27' : '#8B8C80'}; font-family:'Inter',sans-serif; font-weight:${active ? '700' : '600'}; font-size:14px; padding:10px 14px; border-radius:12px; cursor:pointer; box-shadow:${active ? '0 1px 3px rgba(30,28,20,0.08)' : 'none'};`;\n\n    const key = this.dateKey(today);\n    const days7 = this.last7(today);\n    const hour = today.getHours();\n    const greeting = (hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening') + `, ${name}`;\n    const dateLabel = today.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });\n\n    const shapeFlags = (shape) => ({\n      isCircle: shape === 'circle', isRect: shape === 'rect', isRing: shape === 'ring',\n      isDouble: shape === 'double', isDiamond: shape === 'diamond',\n    });\n\n    const enrichHabit = (h) => {\n      const done = h.completedDates.includes(key);\n      const isActiveToday = this.isActiveOn(h, today);\n      const weekCount = days7.filter(d => this.isActiveOn(h, d) && h.completedDates.includes(this.dateKey(d))).length;\n      const possibleThisWeek = days7.filter(d => this.isActiveOn(h, d)).length;\n      const totalCount = h.completedDates.length;\n\n      const weekDots = days7.map(d => {\n        const active = this.isActiveOn(h, d);\n        const dk = this.dateKey(d);\n        const isDone = h.completedDates.includes(dk);\n        const bg = !active ? 'transparent' : (isDone ? this.colorFor(h.hue, 'base') : 'transparent');\n        const border = !active ? '1.5px dashed #E2DDCC' : (isDone ? this.colorFor(h.hue, 'base') : '1.5px solid #E2DDCC');\n        return {\n          dotStyle: `width:9px; height:9px; border-radius:50%; background:${bg}; border:${isDone ? 'none' : border};`,\n          gridDotStyle: `width:15px; height:15px; border-radius:50%; background:${bg}; border:${isDone ? 'none' : border};`,\n        };\n      });\n\n      const metaLine = (h.frequency === 'weekdays' ? 'Weekdays' : 'Every day') + (h.reminderTime ? ` \\u00b7 ${h.reminderTime}` : '');\n      let statusText;\n      if (!isActiveToday) statusText = 'Not scheduled today';\n      else if (streakStyle === 'numbers') statusText = `${weekCount}/${possibleThisWeek} this week`;\n      else statusText = weekCount === 0 ? 'A fresh week ahead' : `Showing up this week`;\n\n      const dotColor = this.colorFor(h.hue, 'base');\n      const cardStyle = `display:flex; align-items:center; gap:16px; background:#fff; border:1px solid #ECE8DA; border-radius:18px; padding:${density === 'compact' ? '14px 18px' : '18px 20px'}; opacity:${isActiveToday ? '1' : '0.6'};`;\n      const avatarStyle = `flex:none; width:40px; height:40px; border-radius:12px; background:${this.colorFor(h.hue, 'light')}; display:flex; align-items:center; justify-content:center;`;\n      const miniAvatarStyle = `width:24px; height:24px; border-radius:7px; background:${this.colorFor(h.hue, 'light')}; border:2px solid ${dotColor};`;\n      const checkStyle = `flex:none; width:32px; height:32px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; background:${done ? dotColor : '#F1EEE3'};`;\n\n      return {\n        ...h, done, isActiveToday, isRestDay: !isActiveToday, weekCount, totalCount, weekDots, metaLine, statusText,\n        dotColor, cardStyle, avatarStyle, miniAvatarStyle, checkStyle,\n        ...shapeFlags(h.shape),\n        toggle: () => this.toggleToday(h.id),\n        openDetail: () => this.setState({ detailHabitId: h.id }),\n        openEdit: () => this.openEdit(h),\n      };\n    };\n\n    const enriched = habits.map(enrichHabit);\n\n    const weekDayLabels = days7.map(d => d.toLocaleDateString(undefined, { weekday: 'short' }));\n    const weekRangeLabel = `${days7[0].toLocaleDateString(undefined,{month:'short',day:'numeric'})} \\u2013 ${days7[6].toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;\n    const weekTotal = enriched.reduce((s,h) => s + h.weekCount, 0);\n    const weekSummaryLine = weekTotal === 0 ? 'A new week is starting \\u2014 no pressure, just possibility.' : `You showed up ${weekTotal} times this week. Every one of them counts.`;\n\n    const hueList = [150, 50, 230, 90, 320];\n    const hueOptions = hueList.map(hue => ({\n      hue,\n      select: () => this.setState({ draftHue: hue }),\n      swatchStyle: `width:30px; height:30px; border-radius:50%; background:${this.colorFor(hue,'base')}; cursor:pointer; border:${draftHue === hue ? '3px solid #2C2D27' : '3px solid transparent'}; box-shadow:0 0 0 1px rgba(0,0,0,0.04);`,\n    }));\n\n    const isEditing = editingHabitId != null;\n    const modalTitle = isEditing ? 'Edit habit' : 'Add a small habit';\n\n    const chipStyle = (active) => `flex:1; border:1.5px solid ${active ? this.colorFor(150,'base') : '#E6E1D3'}; background:${active ? this.colorFor(150,'light') : '#fff'}; color:${active ? this.colorFor(150,'dark') : '#6B6C63'}; font-weight:600; font-size:13px; padding:9px 0; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif;`;\n\n    let detailHabit = null, detailGrid = [], detailStatLine = '', detailMetaLine = '', detailAvatarStyle = '', detailName = '';\n    if (detailHabitId != null) {\n      const raw = habits.find(h => h.id === detailHabitId);\n      if (raw) {\n        detailHabit = enrichHabit(raw);\n        detailName = raw.name;\n        detailMetaLine = detailHabit.metaLine;\n        detailAvatarStyle = detailHabit.avatarStyle;\n        detailStatLine = detailHabit.totalCount === 0\n          ? 'No days logged yet \\u2014 whenever you start, it counts.'\n          : `You've shown up ${detailHabit.totalCount} time${detailHabit.totalCount===1?'':'s'} since you started. That's real consistency.`;\n        for (let i = 34; i >= 0; i--) {\n          const d = new Date(today);\n          d.setDate(d.getDate() - i);\n          const active = this.isActiveOn(raw, d);\n          const isDone = raw.completedDates.includes(this.dateKey(d));\n          const bg = !active ? '#F1EEE3' : (isDone ? this.colorFor(raw.hue,'base') : '#F1EEE3');\n          detailGrid.push({ cellStyle: `width:100%; aspect-ratio:1; border-radius:5px; background:${bg};` });\n        }\n      }\n    }\n\n    return {\n      isToday: view === 'today', isWeek: view === 'week', isSettings: view === 'settings',\n      goToday: () => this.setState({ view: 'today' }),\n      goWeek: () => this.setState({ view: 'week' }),\n      goSettings: () => this.setState({ view: 'settings' }),\n      navTodayStyle: navStyle(view === 'today'), navWeekStyle: navStyle(view === 'week'), navSettingsStyle: navStyle(view === 'settings'),\n      mainPadding, sectionGap, cardGap,\n      greeting, dateLabel,\n      habits: enriched,\n      accentLight, accentMid, accentDark,\n      weekDayLabels, weekRangeLabel, weekSummaryLine,\n      name, setName: (e) => this.setState({ name: e.target.value }),\n      reminderOn, weeklyEmailOn,\n      toggleReminder: () => this.setState({ reminderOn: !reminderOn }),\n      toggleWeeklyEmail: () => this.setState({ weeklyEmailOn: !weeklyEmailOn }),\n      reminderToggleStyle: `width:40px; height:24px; border-radius:12px; background:${reminderOn ? accentMid : '#E6E1D3'}; cursor:pointer; padding:3px; display:flex;`,\n      reminderThumbStyle: `width:18px; height:18px; border-radius:50%; background:#fff; transform:translateX(${reminderOn ? '16px' : '0'}); transition:transform 0.15s ease;`,\n      weeklyToggleStyle: `width:40px; height:24px; border-radius:12px; background:${weeklyEmailOn ? accentMid : '#E6E1D3'}; cursor:pointer; padding:3px; display:flex;`,\n      weeklyThumbStyle: `width:18px; height:18px; border-radius:50%; background:#fff; transform:translateX(${weeklyEmailOn ? '16px' : '0'}); transition:transform 0.15s ease;`,\n      modalOpen, openAdd: () => this.openAdd(), closeModal: () => this.setState({ modalOpen: false }),\n      stopClick: (e) => e.stopPropagation(),\n      modalTitle, isEditing, isEditingFalse: !isEditing,\n      draftName, setDraftName: (e) => this.setState({ draftName: e.target.value }),\n      draftReminder, setDraftReminder: (e) => this.setState({ draftReminder: e.target.value }),\n      hueOptions,\n      setFreqDaily: () => this.setState({ draftFrequency: 'daily' }),\n      setFreqWeekdays: () => this.setState({ draftFrequency: 'weekdays' }),\n      freqDailyStyle: chipStyle(draftFrequency === 'daily'),\n      freqWeekdaysStyle: chipStyle(draftFrequency === 'weekdays'),\n      saveHabit: () => this.saveHabit(),\n      deleteDraft: () => this.deleteDraft(),\n      detailOpen: detailHabitId != null,\n      detailName, detailMetaLine, detailAvatarStyle, detailStatLine, detailGrid,\n      closeDetail: () => this.setState({ detailHabitId: null }),\n      editFromDetail: () => { const h = habits.find(x => x.id === detailHabitId); if (h) this.openEdit(h); },\n      celebration,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
