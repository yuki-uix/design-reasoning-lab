document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7fdc72e3-20ba-43c2-a55f-c294833212b0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    body { margin: 0; }\n    a { color: inherit; }\n    a:hover { color: inherit; }\n    @keyframes hb-slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n    @keyframes hb-fadeIn { from { opacity: 0; } to { opacity: 1; } }\n    ::-webkit-scrollbar { width: 0; height: 0; }\n  <\u002Fstyle>\n  \n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#EAE6DD; display:flex; align-items:center; justify-content:center; padding:48px 20px; font-family:'Figtree',system-ui,sans-serif; box-sizing:border-box;\">\n  <div style=\"width:393px; height:840px; background:#FBF9F5; border-radius:46px; box-shadow:0 40px 80px rgba(43,42,39,.22), 0 0 0 11px #211F1B; position:relative; overflow:hidden; display:flex; flex-direction:column;\">\n\n    <!-- status bar -->\n    <div style=\"flex:0 0 auto; height:46px; display:flex; align-items:center; justify-content:space-between; padding:0 30px; font-size:14px; font-weight:700; color:#2B2A27; letter-spacing:.2px;\">\n      <span>9:41<\u002Fspan>\n      <span style=\"font-weight:600; font-size:11px; letter-spacing:1px; color:rgba(43,42,39,.45);\">HABITLY<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- content -->\n    <div style=\"flex:1 1 auto; overflow-y:auto; position:relative; padding-bottom:16px;\">\n\n      <!-- TODAY SCREEN -->\n      <sc-if value=\"{{ isToday }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:6px 24px 8px;\">\n          <div style=\"font-size:22px; font-weight:800; color:#2B2A27; letter-spacing:-.3px;\">{{ greeting }}<\u002Fdiv>\n          <div style=\"font-size:14px; color:rgba(43,42,39,.55); margin-top:2px; font-weight:500;\">{{ dateStr }}<\u002Fdiv>\n\n          <div style=\"margin-top:20px; background:{{ progressCardBg }}; border-radius:20px; padding:18px 20px; display:flex; align-items:center; gap:16px;\">\n            <div style=\"position:relative; width:56px; height:56px; flex:0 0 auto;\">\n              <svg width=\"56\" height=\"56\" viewBox=\"0 0 56 56\" style=\"transform:rotate(-90deg);\">\n                <circle cx=\"28\" cy=\"28\" r=\"24\" fill=\"none\" stroke=\"rgba(255,255,255,.5)\" stroke-width=\"6\"><\u002Fcircle>\n                <circle cx=\"28\" cy=\"28\" r=\"24\" fill=\"none\" stroke=\"{{ primaryAccentColor }}\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"{{ progressDashArray }}\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#2B2A27;\">{{ completedCount }}/{{ totalTodayCount }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 auto;\">\n              <div style=\"font-size:15px; font-weight:700; color:#2B2A27;\">{{ progressHeadline }}<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:rgba(43,42,39,.6); margin-top:2px; font-weight:500;\">{{ progressSubline }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:4px 24px 0; display:flex; flex-direction:column; gap:12px;\">\n          <sc-for list=\"{{ todayHabits }}\" as=\"h\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff; border:1px solid rgba(43,42,39,.07); border-radius:18px; padding:14px 16px; display:flex; align-items:center; gap:14px;\">\n              <div style=\"width:44px; height:44px; border-radius:14px; background:{{ h.colorSoft }}; color:{{ h.colorMain }}; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; flex:0 0 auto;\">{{ h.initial }}<\u002Fdiv>\n              <div style=\"flex:1 1 auto; min-width:0;\">\n                <div style=\"font-size:15.5px; font-weight:700; color:#2B2A27;\">{{ h.name }}<\u002Fdiv>\n                <div style=\"font-size:12.5px; color:rgba(43,42,39,.5); margin-top:2px; font-weight:500;\">{{ h.scheduleLabel }} · {{ h.reminderLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ h.toggle }}\" style=\"width:32px; height:32px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .18s ease; box-sizing:border-box; border:{{ h.checkBorder }}; background:{{ h.checkBg }};\">\n                <span style=\"color:#fff; font-size:16px; font-weight:800; opacity:{{ h.checkOpacity }}; transition:opacity .15s ease;\">✓<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div onclick=\"{{ openCreate }}\" style=\"margin-top:4px; border:1.5px dashed rgba(43,42,39,.22); border-radius:18px; padding:14px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; color:rgba(43,42,39,.5); font-weight:600; font-size:14px;\">\n            <span style=\"width:22px; height:22px; border-radius:50%; border:1.5px solid rgba(43,42,39,.3); display:flex; align-items:center; justify-content:center; font-size:14px; line-height:1;\">+<\u002Fspan>\n            Add a habit\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- WEEKLY SCREEN -->\n      <sc-if value=\"{{ isWeekly }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:6px 24px 8px;\">\n          <div style=\"font-size:22px; font-weight:800; color:#2B2A27; letter-spacing:-.3px;\">This week<\u002Fdiv>\n          <div style=\"font-size:14px; color:rgba(43,42,39,.55); margin-top:2px; font-weight:500;\">{{ weekRangeLabel }}<\u002Fdiv>\n\n          <div style=\"margin-top:18px; background:#fff; border:1px solid rgba(43,42,39,.07); border-radius:20px; padding:16px 18px 12px;\">\n            <div style=\"display:flex; align-items:flex-end; justify-content:space-between; height:74px; gap:6px;\">\n              <sc-for list=\"{{ weekDayBars }}\" as=\"d\" hint-placeholder-count=\"7\">\n                <div style=\"flex:1 1 0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px;\">\n                  <div style=\"width:100%; max-width:22px; height:{{ d.barHeight }}; background:{{ d.barColor }}; border-radius:6px; transition:height .2s ease;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; margin-top:8px;\">\n              <sc-for list=\"{{ weekDayBars }}\" as=\"d\" hint-placeholder-count=\"7\">\n                <div style=\"flex:1 1 0; text-align:center; font-size:11.5px; font-weight:{{ d.labelWeight }}; color:{{ d.labelColor }};\">{{ d.letter }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:16px 24px 0; display:flex; flex-direction:column; gap:14px;\">\n          <sc-for list=\"{{ weeklyHabits }}\" as=\"h\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff; border:1px solid rgba(43,42,39,.07); border-radius:18px; padding:14px 16px;\">\n              <div style=\"display:flex; align-items:center; gap:12px;\">\n                <div style=\"width:38px; height:38px; border-radius:12px; background:{{ h.colorSoft }}; color:{{ h.colorMain }}; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex:0 0 auto;\">{{ h.initial }}<\u002Fdiv>\n                <div style=\"flex:1 1 auto; min-width:0;\">\n                  <div style=\"font-size:14.5px; font-weight:700; color:#2B2A27;\">{{ h.name }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:5px; background:{{ h.streakBg }}; padding:4px 10px; border-radius:100px; flex:0 0 auto;\">\n                  <span style=\"font-size:12.5px; font-weight:800; color:{{ h.colorMain }};\">{{ h.streak }}<\u002Fspan>\n                  <span style=\"font-size:11px; font-weight:600; color:{{ h.colorMain }}; opacity:.75;\">day streak<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:6px; margin-top:12px;\">\n                <sc-for list=\"{{ h.chips }}\" as=\"c\" hint-placeholder-count=\"7\">\n                  <div style=\"flex:1 1 0; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:{{ c.bg }}; border:{{ c.border }};\">\n                    <span style=\"font-size:12px; font-weight:800; color:{{ c.color }};\">{{ c.mark }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- TAB BAR -->\n    <sc-if value=\"{{ showTabBar }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:0 0 auto; display:flex; align-items:center; justify-content:space-around; padding:10px 24px 22px; background:#FBF9F5; border-top:1px solid rgba(43,42,39,.07);\">\n        <div onclick=\"{{ goToday }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; width:64px;\">\n          <div style=\"width:8px; height:8px; border-radius:50%; background:{{ todayDotColor }};\"><\u002Fdiv>\n          <span style=\"font-size:12px; font-weight:700; color:{{ todayTabColor }};\">Today<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ openCreate }}\" style=\"width:52px; height:52px; border-radius:50%; background:{{ primaryAccentColor }}; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 8px 18px {{ primaryAccentShadow }}; margin-top:-26px;\">\n          <span style=\"color:#fff; font-size:26px; font-weight:600; line-height:1;\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goWeekly }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; width:64px;\">\n          <div style=\"width:8px; height:8px; border-radius:50%; background:{{ weeklyDotColor }};\"><\u002Fdiv>\n          <span style=\"font-size:12px; font-weight:700; color:{{ weeklyTabColor }};\">Progress<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- CREATE HABIT OVERLAY -->\n    <sc-if value=\"{{ showCreate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; background:#FBF9F5; display:flex; flex-direction:column; animation:hb-slideUp .28s ease;\">\n        <div style=\"flex:0 0 auto; padding:20px 20px 0; display:flex; align-items:center; justify-content:space-between;\">\n          <div onclick=\"{{ closeCreate }}\" style=\"width:32px; height:32px; border-radius:50%; background:rgba(43,42,39,.06); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; font-weight:700; color:#2B2A27;\">✕<\u002Fdiv>\n          <div style=\"display:flex; gap:6px;\">\n            <sc-for list=\"{{ stepDots }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div style=\"width:{{ s.width }}; height:6px; border-radius:3px; background:{{ s.bg }}; transition:all .2s ease;\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"width:32px;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1 1 auto; overflow-y:auto; padding:24px 24px 8px;\">\n\n          <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:20px; font-weight:800; color:#2B2A27;\">What's the habit?<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:rgba(43,42,39,.55); margin-top:6px; font-weight:500;\">Small and specific works best.<\u002Fdiv>\n            <input value=\"{{ newHabitName }}\" onchange=\"{{ setName }}\" placeholder=\"e.g. Drink water\" style=\"margin-top:22px; width:100%; box-sizing:border-box; border:1.5px solid rgba(43,42,39,.14); border-radius:14px; padding:15px 16px; font-size:16px; font-family:'Figtree',sans-serif; font-weight:600; color:#2B2A27; outline:none; background:#fff;\">\n\n            <div style=\"margin-top:26px; font-size:13px; font-weight:700; color:rgba(43,42,39,.55); text-transform:uppercase; letter-spacing:.4px;\">Color<\u002Fdiv>\n            <div style=\"display:flex; gap:12px; margin-top:12px;\">\n              <sc-for list=\"{{ colorOptions }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ c.select }}\" style=\"width:42px; height:42px; border-radius:12px; background:{{ c.main }}; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:{{ c.ring }};\">\n                  <span style=\"color:#fff; font-size:15px; font-weight:800; opacity:{{ c.checkOpacity }};\">✓<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:20px; font-weight:800; color:#2B2A27;\">When?<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:rgba(43,42,39,.55); margin-top:6px; font-weight:500;\">Choose how often you'll do it.<\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:10px; margin-top:20px;\">\n              <sc-for list=\"{{ presetOptions }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ p.select }}\" style=\"padding:14px 16px; border-radius:14px; border:1.5px solid {{ p.border }}; background:{{ p.bg }}; cursor:pointer; display:flex; align-items:center; justify-content:space-between;\">\n                  <span style=\"font-size:14.5px; font-weight:700; color:{{ p.textColor }};\">{{ p.label }}<\u002Fspan>\n                  <div style=\"width:20px; height:20px; border-radius:50%; border:1.5px solid {{ p.dotBorder }}; background:{{ p.dotBg }}; flex:0 0 auto;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ isCustomSchedule }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; gap:6px; margin-top:16px;\">\n                <sc-for list=\"{{ customDayChips }}\" as=\"d\" hint-placeholder-count=\"7\">\n                  <div onclick=\"{{ d.toggle }}\" style=\"flex:1 1 0; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:{{ d.bg }}; border:1.5px solid {{ d.border }};\">\n                    <span style=\"font-size:13px; font-weight:800; color:{{ d.color }};\">{{ d.letter }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:20px; font-weight:800; color:#2B2A27;\">Reminder time<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:rgba(43,42,39,.55); margin-top:6px; font-weight:500;\">We'll nudge you once a day.<\u002Fdiv>\n\n            <input type=\"time\" value=\"{{ newHabitReminderTime }}\" onchange=\"{{ setReminderTime }}\" style=\"margin-top:22px; width:100%; box-sizing:border-box; border:1.5px solid rgba(43,42,39,.14); border-radius:14px; padding:15px 16px; font-size:18px; font-family:'Figtree',sans-serif; font-weight:700; color:#2B2A27; outline:none; background:#fff;\">\n\n            <div style=\"display:flex; gap:8px; margin-top:14px;\">\n              <sc-for list=\"{{ reminderPresets }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ r.select }}\" style=\"flex:1 1 0; padding:10px 8px; border-radius:12px; border:1.5px solid rgba(43,42,39,.12); background:#fff; text-align:center; cursor:pointer;\">\n                  <span style=\"font-size:12.5px; font-weight:700; color:#2B2A27;\">{{ r.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:26px; background:{{ summaryBg }}; border-radius:16px; padding:16px 18px;\">\n              <div style=\"font-size:13px; font-weight:700; color:rgba(43,42,39,.5); text-transform:uppercase; letter-spacing:.4px;\">Summary<\u002Fdiv>\n              <div style=\"font-size:15.5px; font-weight:800; color:#2B2A27; margin-top:6px;\">{{ summaryName }}<\u002Fdiv>\n              <div style=\"font-size:13px; font-weight:600; color:rgba(43,42,39,.6); margin-top:2px;\">{{ summarySchedule }} · {{ summaryTime }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"flex:0 0 auto; padding:16px 24px 24px; display:flex; gap:10px;\">\n          <sc-if value=\"{{ showBackButton }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ prevStep }}\" style=\"flex:0 0 auto; padding:15px 22px; border-radius:14px; background:rgba(43,42,39,.06); display:flex; align-items:center; justify-content:center; cursor:pointer;\">\n              <span style=\"font-size:15px; font-weight:700; color:#2B2A27;\">Back<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div onclick=\"{{ primaryStepAction }}\" style=\"flex:1 1 auto; padding:15px 22px; border-radius:14px; background:{{ primaryButtonBg }}; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:{{ primaryButtonOpacity }};\">\n            <span style=\"font-size:15px; font-weight:700; color:#fff;\">{{ primaryButtonLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 393, &quot;height&quot;: 840}, &quot;primaryAccent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#4C6B54&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#4C6B54&quot;, &quot;#4E7093&quot;, &quot;#C4693B&quot;]}, &quot;tone&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;encouraging&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;encouraging&quot;, &quot;minimal&quot;]}, &quot;userName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;}}\">\nconst PALETTE = [\n  { main: '#4C6B54', soft: '#E4EAE1', streakBg: '#E4EAE1' },\n  { main: '#C4693B', soft: '#F5E2D6', streakBg: '#F5E2D6' },\n  { main: '#4E7093', soft: '#DFE7ED', streakBg: '#DFE7ED' },\n  { main: '#B08A2E', soft: '#F0E5CA', streakBg: '#F0E5CA' }\n];\nconst DAY_LETTERS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\nconst DAY_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];\n\nfunction mondayIndex(date) { return (date.getDay() + 6) % 7; }\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'today',\n    showCreate: false,\n    createStep: 1,\n    habits: [\n      { id: 1, name: 'Drink water', colorIdx: 0, days: [0,1,2,3,4,5,6], reminderTime: '08:00', streak: 12, history: [true,false,false,false,false,false,false], doneToday: false },\n      { id: 2, name: 'Stretch 5 min', colorIdx: 1, days: [0,1,2,3,4], reminderTime: '07:00', streak: 5, history: [true,true,false,false,false,false,false], doneToday: true },\n      { id: 3, name: 'Read to kids', colorIdx: 2, days: [0,1,2,3,4,5,6], reminderTime: '20:00', streak: 27, history: [true,false,false,false,false,false,false], doneToday: false },\n      { id: 4, name: 'Meal prep check', colorIdx: 3, days: [0,2,4], reminderTime: '18:30', streak: 3, history: [true,false,false,false,false,false,false], doneToday: false }\n    ],\n    newHabitName: '',\n    newHabitColorIdx: 0,\n    scheduleType: 'daily',\n    customDays: [0,2,4],\n    reminderTime: '08:00'\n  };\n\n  todayIndex() { return mondayIndex(new Date()); }\n\n  toggleHabit(id) {\n    this.setState(s => ({\n      habits: s.habits.map(h => {\n        if (h.id !== id) return h;\n        const nowDone = !h.doneToday;\n        const idx = this.todayIndex();\n        const history = h.history.slice();\n        history[idx] = nowDone;\n        return { ...h, doneToday: nowDone, streak: nowDone ? h.streak + 1 : Math.max(0, h.streak - 1), history };\n      })\n    }));\n  }\n\n  goToday() { this.setState({ screen: 'today' }); }\n  goWeekly() { this.setState({ screen: 'weekly' }); }\n  openCreate() { this.setState({ showCreate: true, createStep: 1, newHabitName: '', newHabitColorIdx: 0, scheduleType: 'daily', customDays: [0,2,4], reminderTime: '08:00' }); }\n  closeCreate() { this.setState({ showCreate: false }); }\n\n  nextStep() { this.setState(s => ({ createStep: Math.min(3, s.createStep + 1) })); }\n  prevStep() { this.setState(s => ({ createStep: Math.max(1, s.createStep - 1) })); }\n\n  setName(e) { this.setState({ newHabitName: e.target.value }); }\n  selectColor(idx) { this.setState({ newHabitColorIdx: idx }); }\n  selectSchedulePreset(type) {\n    this.setState(s => ({ scheduleType: type, customDays: type === 'custom' ? (s.customDays.length ? s.customDays : [0,2,4]) : s.customDays }));\n  }\n  toggleCustomDay(d) {\n    this.setState(s => {\n      const has = s.customDays.includes(d);\n      return { customDays: has ? s.customDays.filter(x => x !== d) : [...s.customDays, d].sort() };\n    });\n  }\n  setReminderTime(e) { this.setState({ reminderTime: e.target.value }); }\n  selectReminderPreset(t) { this.setState({ reminderTime: t }); }\n\n  scheduleDays() {\n    const { scheduleType, customDays } = this.state;\n    if (scheduleType === 'daily') return [0,1,2,3,4,5,6];\n    if (scheduleType === 'weekdays') return [0,1,2,3,4];\n    return customDays;\n  }\n\n  saveHabit() {\n    this.setState(s => {\n      const days = this.scheduleDays();\n      const habit = {\n        id: Date.now(),\n        name: s.newHabitName.trim() || 'New habit',\n        colorIdx: s.newHabitColorIdx,\n        days,\n        reminderTime: s.reminderTime,\n        streak: 0,\n        history: [false,false,false,false,false,false,false],\n        doneToday: false\n      };\n      return { habits: [...s.habits, habit], showCreate: false };\n    });\n  }\n\n  primaryStepAction() {\n    const { createStep } = this.state;\n    if (createStep < 3) this.nextStep();\n    else this.saveHabit();\n  }\n\n  scheduleLabel(days) {\n    if (days.length === 7) return 'Every day';\n    if (days.length === 5 && [0,1,2,3,4].every(d => days.includes(d))) return 'Weekdays';\n    return days.map(d => DAY_SHORT[d].slice(0,3)).join(', ');\n  }\n\n  formatTime(t) {\n    const [hh, mm] = t.split(':').map(Number);\n    const period = hh >= 12 ? 'PM' : 'AM';\n    const h12 = ((hh + 11) % 12) + 1;\n    return `${h12}:${String(mm).padStart(2,'0')} ${period}`;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const todayIdx = this.todayIndex();\n    const now = new Date();\n    const hour = now.getHours();\n    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';\n    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });\n\n    const primaryAccentColor = this.props.primaryAccent ?? '#4C6B54';\n    const tone = this.props.tone ?? 'encouraging';\n    const userName = this.props.userName ?? '';\n\n    const todayHabitsRaw = s.habits.filter(h => h.days.includes(todayIdx));\n    const completedCount = todayHabitsRaw.filter(h => h.doneToday).length;\n    const totalTodayCount = todayHabitsRaw.length;\n    const pct = totalTodayCount ? completedCount / totalTodayCount : 0;\n    const circumference = 2 * Math.PI * 24;\n\n    const todayHabits = todayHabitsRaw.map(h => {\n      const c = PALETTE[h.colorIdx];\n      return {\n        id: h.id,\n        name: h.name,\n        initial: h.name.trim().charAt(0).toUpperCase() || '?',\n        colorMain: c.main,\n        colorSoft: c.soft,\n        scheduleLabel: this.scheduleLabel(h.days),\n        reminderLabel: this.formatTime(h.reminderTime),\n        checkBg: h.doneToday ? c.main : 'transparent',\n        checkBorder: h.doneToday ? `2px solid ${c.main}` : '2px solid rgba(43,42,39,.2)',\n        checkOpacity: h.doneToday ? 1 : 0,\n        toggle: () => this.toggleHabit(h.id)\n      };\n    });\n\n    let progressHeadline, progressSubline;\n    if (totalTodayCount === 0) {\n      progressHeadline = 'No habits scheduled today';\n      progressSubline = 'Enjoy the day off.';\n    } else if (completedCount === totalTodayCount) {\n      progressHeadline = tone === 'minimal' ? 'All done' : 'All done — nice work!';\n      progressSubline = 'Every habit checked off today.';\n    } else {\n      progressHeadline = tone === 'minimal' ? `${completedCount} of ${totalTodayCount} done` : `${completedCount} of ${totalTodayCount} done today`;\n      progressSubline = tone === 'minimal' ? `${totalTodayCount - completedCount} remaining` : 'Small steps still count.';\n    }\n\n    const weeklyHabits = s.habits.map(h => {\n      const c = PALETTE[h.colorIdx];\n      const chips = DAY_LETTERS.map((letter, i) => {\n        const scheduled = h.days.includes(i);\n        const isFuture = i > todayIdx;\n        const done = h.history[i];\n        if (!scheduled) return { bg: 'rgba(43,42,39,.04)', border: '1.5px solid transparent', color: 'rgba(43,42,39,.2)', mark: '·' };\n        if (isFuture) return { bg: '#fff', border: '1.5px dashed rgba(43,42,39,.16)', color: 'rgba(43,42,39,.3)', mark: '' };\n        if (done) return { bg: c.main, border: `1.5px solid ${c.main}`, color: '#fff', mark: '✓' };\n        return { bg: '#fff', border: '1.5px solid rgba(43,42,39,.16)', color: 'rgba(43,42,39,.35)', mark: '' };\n      });\n      return {\n        id: h.id,\n        name: h.name,\n        initial: h.name.trim().charAt(0).toUpperCase() || '?',\n        colorMain: c.main,\n        colorSoft: c.soft,\n        streakBg: c.streakBg,\n        streak: h.streak,\n        chips\n      };\n    });\n\n    const maxCount = Math.max(1, ...s.habits.map(() => 1));\n    const weekDayBars = DAY_LETTERS.map((letter, i) => {\n      const isFuture = i > todayIdx;\n      const scheduledToday = s.habits.filter(h => h.days.includes(i));\n      const doneCount = isFuture ? 0 : scheduledToday.filter(h => h.history[i]).length;\n      const total = scheduledToday.length || 1;\n      const ratio = isFuture ? 0.06 : Math.max(0.08, doneCount / total);\n      return {\n        letter,\n        barHeight: `${Math.round(ratio * 64)}px`,\n        barColor: isFuture ? 'rgba(43,42,39,.08)' : (i === todayIdx ? primaryAccentColor : 'rgba(76,107,84,.35)'),\n        labelWeight: i === todayIdx ? 800 : 600,\n        labelColor: i === todayIdx ? '#2B2A27' : 'rgba(43,42,39,.4)'\n      };\n    });\n\n    const weekStart = new Date(now);\n    weekStart.setDate(now.getDate() - todayIdx);\n    const weekEnd = new Date(weekStart);\n    weekEnd.setDate(weekStart.getDate() + 6);\n    const weekRangeLabel = `${weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${weekEnd.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;\n\n    const colorOptions = PALETTE.map((c, i) => ({\n      main: c.main,\n      ring: s.newHabitColorIdx === i ? `0 0 0 3px #fff, 0 0 0 5px ${c.main}` : 'none',\n      checkOpacity: s.newHabitColorIdx === i ? 1 : 0,\n      select: () => this.selectColor(i)\n    }));\n\n    const presetDefs = [\n      { key: 'daily', label: 'Every day' },\n      { key: 'weekdays', label: 'Weekdays' },\n      { key: 'custom', label: 'Custom days' }\n    ];\n    const presetOptions = presetDefs.map(p => {\n      const active = s.scheduleType === p.key;\n      return {\n        label: p.label,\n        border: active ? primaryAccentColor : 'rgba(43,42,39,.14)',\n        bg: active ? `${primaryAccentColor}14` : '#fff',\n        textColor: active ? primaryAccentColor : '#2B2A27',\n        dotBorder: active ? primaryAccentColor : 'rgba(43,42,39,.25)',\n        dotBg: active ? primaryAccentColor : 'transparent',\n        select: () => this.selectSchedulePreset(p.key)\n      };\n    });\n\n    const customDayChips = DAY_SHORT.map((_, i) => {\n      const active = s.customDays.includes(i);\n      return {\n        letter: DAY_LETTERS[i],\n        bg: active ? primaryAccentColor : '#fff',\n        border: active ? primaryAccentColor : 'rgba(43,42,39,.16)',\n        color: active ? '#fff' : 'rgba(43,42,39,.5)',\n        toggle: () => this.toggleCustomDay(i)\n      };\n    });\n\n    const reminderPresets = [\n      { label: 'Morning · 8am', time: '08:00' },\n      { label: 'Midday · 1pm', time: '13:00' },\n      { label: 'Evening · 8pm', time: '20:00' }\n    ].map(r => ({ label: r.label, select: () => this.selectReminderPreset(r.time) }));\n\n    const canProceedStep1 = s.newHabitName.trim().length > 0;\n    const stepDots = [1,2,3].map(n => ({ width: n === s.createStep ? '22px' : '6px', bg: n <= s.createStep ? primaryAccentColor : 'rgba(43,42,39,.14)' }));\n\n    const scheduleDays = this.scheduleDays();\n\n    return {\n      isToday: s.screen === 'today' && !s.showCreate,\n      isWeekly: s.screen === 'weekly' && !s.showCreate,\n      showTabBar: !s.showCreate,\n      showCreate: s.showCreate,\n      greeting: userName ? `${greeting}, ${userName}` : greeting,\n      dateStr,\n      todayHabits,\n      completedCount,\n      totalTodayCount,\n      progressDashArray: `${circumference * pct} ${circumference}`,\n      progressHeadline,\n      progressSubline,\n      progressCardBg: `${primaryAccentColor}1A`,\n      primaryAccentColor,\n      primaryAccentShadow: `${primaryAccentColor}55`,\n      openCreate: () => this.openCreate(),\n      goToday: () => this.goToday(),\n      goWeekly: () => this.goWeekly(),\n      todayTabColor: s.screen === 'today' ? '#2B2A27' : 'rgba(43,42,39,.4)',\n      weeklyTabColor: s.screen === 'weekly' ? '#2B2A27' : 'rgba(43,42,39,.4)',\n      todayDotColor: s.screen === 'today' ? primaryAccentColor : 'transparent',\n      weeklyDotColor: s.screen === 'weekly' ? primaryAccentColor : 'transparent',\n      weekRangeLabel,\n      weekDayBars,\n      weeklyHabits,\n      closeCreate: () => this.closeCreate(),\n      stepDots,\n      isStep1: s.createStep === 1,\n      isStep2: s.createStep === 2,\n      isStep3: s.createStep === 3,\n      newHabitName: s.newHabitName,\n      setName: (e) => this.setName(e),\n      colorOptions,\n      presetOptions,\n      isCustomSchedule: s.scheduleType === 'custom',\n      customDayChips,\n      newHabitReminderTime: s.reminderTime,\n      setReminderTime: (e) => this.setReminderTime(e),\n      reminderPresets,\n      summaryBg: `${PALETTE[s.newHabitColorIdx].main}14`,\n      summaryName: s.newHabitName.trim() || 'New habit',\n      summarySchedule: this.scheduleLabel(scheduleDays),\n      summaryTime: this.formatTime(s.reminderTime),\n      showBackButton: s.createStep > 1,\n      prevStep: () => this.prevStep(),\n      primaryStepAction: () => this.primaryStepAction(),\n      primaryButtonBg: (s.createStep === 1 && !canProceedStep1) ? 'rgba(43,42,39,.25)' : primaryAccentColor,\n      primaryButtonOpacity: (s.createStep === 1 && !canProceedStep1) ? 0.6 : 1,\n      primaryButtonLabel: s.createStep < 3 ? 'Next' : 'Create habit'\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
