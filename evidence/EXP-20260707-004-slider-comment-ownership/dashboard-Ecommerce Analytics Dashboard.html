  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"130559c7-8d0e-48fb-a21e-7b7052bf9c75\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @font-face { font-family: 'System'; src: local('Helvetica Neue'); }\n  body { margin: 0; background: oklch(97.3% 0.008 80); }\n  * { box-sizing: border-box; }\n  ::selection { background: oklch(85% 0.06 155); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; min-height:100vh; font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif; color:oklch(22% 0.01 80); background:oklch(97.3% 0.008 80);\">\n\n  <!-- SIDEBAR -->\n  <div style=\"width:232px; flex:none; background:oklch(20% 0.012 90); color:oklch(92% 0.01 90); display:flex; flex-direction:column; padding:24px 16px; gap:28px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; padding:0 8px;\">\n      <div style=\"width:28px; height:28px; border-radius:8px; background:oklch(70% 0.11 155); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:oklch(20% 0.02 155);\">S<\u002Fdiv>\n      <div style=\"font-weight:600; font-size:15px; letter-spacing:-0.01em;\">Sundial Goods<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:2px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; font-size:13.5px; font-weight:500; cursor:pointer; color:oklch(78% 0.01 90);\" style-hover=\"background:oklch(26% 0.012 90); color:oklch(95% 0.01 90);\">\n          <div style=\"width:16px; height:16px; border-radius:4px; background:oklch(50% 0.01 90 / 0.4); flex:none;\"><\u002Fdiv>\n          <sc-if value=\"{{ item.active }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"color:oklch(97% 0.01 90); font-weight:600;\">{{ item.label }}<\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ item.inactive }}\" hint-placeholder-val=\"{{ true }}\">\n            <span>{{ item.label }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto; display:flex; align-items:center; gap:10px; padding:10px 8px; border-top:1px solid oklch(32% 0.012 90); padding-top:16px;\">\n      <div style=\"width:30px; height:30px; border-radius:50%; background:oklch(55% 0.06 60); flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:white;\">JM<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; line-height:1.25;\">\n        <div style=\"font-size:12.5px; font-weight:600; color:oklch(95% 0.01 90);\">Jamie Ma<\u002Fdiv>\n        <div style=\"font-size:11px; color:oklch(65% 0.01 90);\">Ops Lead<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1; padding:32px 40px 56px; min-width:0; max-width:100%; overflow-x:hidden;\">\n\n    <!-- TOP BAR -->\n    <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:16px;\">\n      <div>\n        <div style=\"font-size:23px; font-weight:700; letter-spacing:-0.015em; color:oklch(18% 0.01 80);\">Overview<\u002Fdiv>\n        <div style=\"font-size:13px; color:oklch(50% 0.01 80); margin-top:2px;\">{{ rangeLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div style=\"display:flex; background:oklch(93% 0.008 80); border-radius:9px; padding:3px; gap:2px;\">\n          <sc-for list=\"{{ ranges }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">{{ r.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:6px; padding:8px 14px; background:oklch(99% 0.004 80); border:1px solid oklch(88% 0.01 80); border-radius:9px; font-size:13px; font-weight:600; color:oklch(30% 0.01 80); cursor:pointer;\" style-hover=\"border-color:oklch(70% 0.01 80);\">\n          Export\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI ROW -->\n    <div style=\"display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; margin-bottom:20px;\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n        <div style=\"background:oklch(99% 0.004 80); border:1px solid oklch(90% 0.01 80); border-radius:14px; padding:18px 20px; min-width:0;\">\n          <div style=\"font-size:12.5px; font-weight:600; color:oklch(50% 0.01 80); text-transform:uppercase; letter-spacing:0.03em;\">{{ k.label }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:8px; margin-top:8px; flex-wrap:wrap; row-gap:4px;\">\n            <div style=\"font-size:22px; font-weight:700; letter-spacing:-0.02em; color:oklch(18% 0.01 80); white-space:nowrap;\">{{ k.value }}<\u002Fdiv>\n            <div style=\"{{ k.changeStyle }} white-space:nowrap;\">{{ k.change }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; color:oklch(55% 0.01 80); margin-top:6px;\">vs. previous period<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- CHART ROW -->\n    <div style=\"display:grid; grid-template-columns:minmax(0,2fr) minmax(0,1fr); gap:16px; margin-bottom:16px; align-items:stretch;\">\n\n      <div style=\"background:oklch(99% 0.004 80); border:1px solid oklch(90% 0.01 80); border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n          <div style=\"font-size:14.5px; font-weight:700; color:oklch(20% 0.01 80);\">Revenue<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:14px; font-size:12px; color:oklch(50% 0.01 80);\">\n            <div style=\"display:flex; align-items:center; gap:6px;\"><div style=\"width:8px; height:8px; border-radius:2px; background:oklch(55% 0.1 155);\"><\u002Fdiv>This period<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 640 200\" style=\"width:100%; height:200px; display:block; overflow:visible;\">\n          <line x1=\"0\" y1=\"50\" x2=\"640\" y2=\"50\" stroke=\"oklch(92% 0.008 80)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"0\" y1=\"100\" x2=\"640\" y2=\"100\" stroke=\"oklch(92% 0.008 80)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"0\" y1=\"150\" x2=\"640\" y2=\"150\" stroke=\"oklch(92% 0.008 80)\" stroke-width=\"1\"><\u002Fline>\n          <polygon points=\"{{ areaPoints }}\" fill=\"oklch(88% 0.06 155 / 0.35)\"><\u002Fpolygon>\n          <polyline points=\"{{ linePoints }}\" fill=\"none\" stroke=\"oklch(50% 0.11 155)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n        <\u002Fsvg>\n        <div style=\"display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:oklch(58% 0.01 80);\">\n          <sc-for list=\"{{ axisLabels }}\" as=\"lbl\" hint-placeholder-count=\"6\">\n            <span>{{ lbl }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:oklch(99% 0.004 80); border:1px solid oklch(90% 0.01 80); border-radius:14px; padding:22px 24px; display:flex; flex-direction:column;\">\n        <div style=\"font-size:14.5px; font-weight:700; color:oklch(20% 0.01 80); margin-bottom:16px;\">Traffic sources<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <sc-for list=\"{{ traffic }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;\">\n                <span style=\"font-weight:600; color:oklch(28% 0.01 80);\">{{ t.label }}<\u002Fspan>\n                <span style=\"color:oklch(50% 0.01 80);\">{{ t.pctLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:7px; border-radius:4px; background:oklch(92% 0.008 80); overflow:hidden;\">\n                <div style=\"{{ t.barStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- BOTTOM ROW -->\n    <div style=\"display:grid; grid-template-columns:minmax(0,1.6fr) minmax(0,1fr); gap:16px;\">\n\n      <div style=\"background:oklch(99% 0.004 80); border:1px solid oklch(90% 0.01 80); border-radius:14px; padding:22px 24px;\">\n        <div style=\"font-size:14.5px; font-weight:700; color:oklch(20% 0.01 80); margin-bottom:14px;\">Top products<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 90px 100px 90px; padding:0 4px 10px; font-size:11.5px; font-weight:600; color:oklch(52% 0.01 80); text-transform:uppercase; letter-spacing:0.02em; border-bottom:1px solid oklch(91% 0.01 80);\">\n          <div>Product<\u002Fdiv><div style=\"text-align:right;\">Units<\u002Fdiv><div style=\"text-align:right;\">Revenue<\u002Fdiv><div style=\"text-align:right;\">Trend<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ topProducts }}\" as=\"p\" hint-placeholder-count=\"5\">\n          <div style=\"display:grid; grid-template-columns:1fr 90px 100px 90px; align-items:center; padding:12px 4px; border-bottom:1px solid oklch(94% 0.008 80);\" style-hover=\"background:oklch(96.5% 0.008 80);\">\n            <div style=\"display:flex; align-items:center; gap:10px; min-width:0;\">\n              <div style=\"width:34px; height:34px; border-radius:8px; flex:none; background:repeating-linear-gradient(135deg, oklch(90% 0.01 80), oklch(90% 0.01 80) 4px, oklch(94% 0.008 80) 4px, oklch(94% 0.008 80) 8px);\"><\u002Fdiv>\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:13px; font-weight:600; color:oklch(24% 0.01 80); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ p.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; color:oklch(55% 0.01 80);\">{{ p.sku }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right; font-size:13px; font-weight:600; color:oklch(30% 0.01 80);\">{{ p.units }}<\u002Fdiv>\n            <div style=\"text-align:right; font-size:13px; font-weight:600; color:oklch(30% 0.01 80);\">{{ p.revenue }}<\u002Fdiv>\n            <div style=\"text-align:right;\"><span style=\"{{ p.trendStyle }}\">{{ p.trend }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:oklch(99% 0.004 80); border:1px solid oklch(90% 0.01 80); border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n          <div style=\"font-size:14.5px; font-weight:700; color:oklch(20% 0.01 80);\">Inventory alerts<\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:600; color:oklch(50% 0.14 40); background:oklch(93% 0.05 40); padding:3px 9px; border-radius:6px;\">{{ lowStockCount }} low<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ lowStock }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; background:oklch(97% 0.006 80);\">\n              <div style=\"width:8px; height:8px; border-radius:50%; flex:none; background:{{ s.dotColor }};\"><\u002Fdiv>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:12.5px; font-weight:600; color:oklch(26% 0.01 80); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ s.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; color:oklch(52% 0.01 80);\">{{ s.qty }} units left<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { range: '30d' };\n\n  datasets = {\n    '7d': {\n      rangeLabel: 'Last 7 days · Jul 3 – Jul 9, 2026',\n      revenue: '$18,420', revenueChange: 4.8,\n      orders: '312', ordersChange: 2.1,\n      conversion: '3.1%', conversionChange: -0.3,\n      aov: '$59.03', aovChange: 2.6,\n      series: [8,9,7,11,10,13,12],\n      axis: ['Jul 3','Jul 4','Jul 5','Jul 6','Jul 7','Jul 8','Jul 9'],\n      traffic: [\n        { label: 'Organic search', pct: 38 },\n        { label: 'Paid social', pct: 27 },\n        { label: 'Email', pct: 19 },\n        { label: 'Direct', pct: 16 },\n      ],\n      topProducts: [\n        { name: 'Linen Weekender Bag', sku: 'SKU-1042', units: 64, revenue: '$5,120', trend: '+12%', up: true },\n        { name: 'Ceramic Pour-Over Set', sku: 'SKU-2210', units: 51, revenue: '$3,876', trend: '+6%', up: true },\n        { name: 'Oat Milk Soap Bar (3pk)', sku: 'SKU-0087', units: 118, revenue: '$2,478', trend: '-4%', up: false },\n        { name: 'Walnut Cutting Board', sku: 'SKU-3305', units: 22, revenue: '$1,980', trend: '+3%', up: true },\n        { name: 'Recycled Wool Throw', sku: 'SKU-4471', units: 19, revenue: '$1,710', trend: '-2%', up: false },\n      ],\n      lowStock: [\n        { name: 'Ceramic Pour-Over Set', qty: 6, level: 'critical' },\n        { name: 'Walnut Cutting Board', qty: 11, level: 'low' },\n        { name: 'Linen Weekender Bag — Sand', qty: 14, level: 'low' },\n      ],\n    },\n    '30d': {\n      rangeLabel: 'Last 30 days · Jun 10 – Jul 9, 2026',\n      revenue: '$76,940', revenueChange: 9.4,\n      orders: '1,284', ordersChange: 6.7,\n      conversion: '2.9%', conversionChange: 0.4,\n      aov: '$59.92', aovChange: 2.1,\n      series: [22,26,24,28,31,27,30,34,29,33,36,32,35,39,37,33,38,41,36,40,44,39,42,46,41,45,48,43,47,50],\n      axis: ['Jun 10','Jun 16','Jun 22','Jun 28','Jul 4','Jul 9'],\n      traffic: [\n        { label: 'Organic search', pct: 41 },\n        { label: 'Paid social', pct: 24 },\n        { label: 'Email', pct: 21 },\n        { label: 'Direct', pct: 14 },\n      ],\n      topProducts: [\n        { name: 'Linen Weekender Bag', sku: 'SKU-1042', units: 248, revenue: '$19,840', trend: '+18%', up: true },\n        { name: 'Ceramic Pour-Over Set', sku: 'SKU-2210', units: 201, revenue: '$15,276', trend: '+9%', up: true },\n        { name: 'Oat Milk Soap Bar (3pk)', sku: 'SKU-0087', units: 462, revenue: '$9,702', trend: '+5%', up: true },\n        { name: 'Walnut Cutting Board', sku: 'SKU-3305', units: 87, revenue: '$7,830', trend: '-3%', up: false },\n        { name: 'Recycled Wool Throw', sku: 'SKU-4471', units: 74, revenue: '$6,660', trend: '+2%', up: true },\n      ],\n      lowStock: [\n        { name: 'Ceramic Pour-Over Set', qty: 6, level: 'critical' },\n        { name: 'Walnut Cutting Board', qty: 11, level: 'low' },\n        { name: 'Linen Weekender Bag — Sand', qty: 14, level: 'low' },\n        { name: 'Oat Milk Soap Bar (3pk)', qty: 22, level: 'low' },\n      ],\n    },\n    '90d': {\n      rangeLabel: 'Last 90 days · Apr 11 – Jul 9, 2026',\n      revenue: '$214,680', revenueChange: 14.2,\n      orders: '3,690', ordersChange: 11.3,\n      conversion: '2.7%', conversionChange: -0.2,\n      aov: '$58.18', aovChange: 2.8,\n      series: [60,64,58,66,70,68,72,75,71,74,78,73,77,82,79,76,81,85,80,84,89,83,87,92,86,90,95,88,93,98,60,64,58,66,70,68,72,75,71,74],\n      axis: ['Apr 11','Apr 25','May 9','May 23','Jun 6','Jun 20','Jul 4'],\n      traffic: [\n        { label: 'Organic search', pct: 44 },\n        { label: 'Paid social', pct: 22 },\n        { label: 'Email', pct: 18 },\n        { label: 'Direct', pct: 16 },\n      ],\n      topProducts: [\n        { name: 'Linen Weekender Bag', sku: 'SKU-1042', units: 702, revenue: '$56,160', trend: '+22%', up: true },\n        { name: 'Ceramic Pour-Over Set', sku: 'SKU-2210', units: 588, revenue: '$44,688', trend: '+15%', up: true },\n        { name: 'Oat Milk Soap Bar (3pk)', sku: 'SKU-0087', units: 1340, revenue: '$28,140', trend: '+8%', up: true },\n        { name: 'Walnut Cutting Board', sku: 'SKU-3305', units: 254, revenue: '$22,860', trend: '+1%', up: true },\n        { name: 'Recycled Wool Throw', sku: 'SKU-4471', units: 210, revenue: '$18,900', trend: '-5%', up: false },\n      ],\n      lowStock: [\n        { name: 'Ceramic Pour-Over Set', qty: 6, level: 'critical' },\n        { name: 'Walnut Cutting Board', qty: 11, level: 'low' },\n        { name: 'Linen Weekender Bag — Sand', qty: 14, level: 'low' },\n      ],\n    },\n  };\n\n  navLabels = ['Overview', 'Orders', 'Products', 'Customers', 'Marketing', 'Settings'];\n\n  setRange(r) {\n    this.setState({ range: r });\n  }\n\n  renderVals() {\n    const d = this.datasets[this.state.range];\n    const posStyle = 'font-size:12.5px; font-weight:700; color:oklch(48% 0.13 155); background:oklch(94% 0.06 155); padding:2px 7px; border-radius:6px;';\n    const negStyle = 'font-size:12.5px; font-weight:700; color:oklch(50% 0.14 40); background:oklch(94% 0.05 40); padding:2px 7px; border-radius:6px;';\n\n    const fmtChange = (v) => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';\n\n    const kpis = [\n      { label: 'Revenue', value: d.revenue, change: fmtChange(d.revenueChange), changeStyle: d.revenueChange >= 0 ? posStyle : negStyle },\n      { label: 'Orders', value: d.orders, change: fmtChange(d.ordersChange), changeStyle: d.ordersChange >= 0 ? posStyle : negStyle },\n      { label: 'Conversion rate', value: d.conversion, change: fmtChange(d.conversionChange), changeStyle: d.conversionChange >= 0 ? posStyle : negStyle },\n      { label: 'Avg. order value', value: d.aov, change: fmtChange(d.aovChange), changeStyle: d.aovChange >= 0 ? posStyle : negStyle },\n    ];\n\n    // Chart geometry\n    const w = 640, h = 200, padTop = 12, padBottom = 12;\n    const series = d.series;\n    const max = Math.max(...series), min = Math.min(...series);\n    const range = (max - min) || 1;\n    const stepX = w / (series.length - 1);\n    const pts = series.map((v, i) => {\n      const x = i * stepX;\n      const y = padTop + (1 - (v - min) / range) * (h - padTop - padBottom);\n      return `${x.toFixed(1)},${y.toFixed(1)}`;\n    });\n    const linePoints = pts.join(' ');\n    const areaPoints = `0,${h} ` + linePoints + ` ${w},${h}`;\n\n    const rangeBtnStyle = (key) => {\n      const active = key === this.state.range;\n      return `padding:7px 14px; border-radius:7px; font-size:12.5px; font-weight:600; cursor:pointer; ` +\n        (active\n          ? 'background:oklch(99% 0.004 80); color:oklch(20% 0.01 80); box-shadow:0 1px 2px oklch(0% 0 0 / 0.08);'\n          : 'color:oklch(50% 0.01 80);');\n    };\n\n    const ranges = [\n      { label: '7D', key: '7d', style: rangeBtnStyle('7d'), onClick: () => this.setRange('7d') },\n      { label: '30D', key: '30d', style: rangeBtnStyle('30d'), onClick: () => this.setRange('30d') },\n      { label: '90D', key: '90d', style: rangeBtnStyle('90d'), onClick: () => this.setRange('90d') },\n    ];\n\n    const traffic = d.traffic.map(t => ({\n      label: t.label,\n      pctLabel: t.pct + '%',\n      barStyle: `width:${t.pct}%; height:100%; background:oklch(58% 0.1 155); border-radius:4px;`,\n    }));\n\n    const topProducts = d.topProducts.map(p => ({\n      ...p,\n      trendStyle: p.up\n        ? 'font-size:12px; font-weight:700; color:oklch(48% 0.13 155);'\n        : 'font-size:12px; font-weight:700; color:oklch(50% 0.14 40);',\n    }));\n\n    const lowStock = d.lowStock.map(s => ({\n      ...s,\n      dotColor: s.level === 'critical' ? 'oklch(55% 0.16 30)' : 'oklch(70% 0.13 75)',\n    }));\n\n    const navItems = this.navLabels.map((label, i) => ({\n      label,\n      active: i === 0,\n      inactive: i !== 0,\n    }));\n\n    return {\n      navItems,\n      rangeLabel: d.rangeLabel,\n      ranges,\n      kpis,\n      linePoints,\n      areaPoints,\n      axisLabels: d.axis,\n      traffic,\n      topProducts,\n      lowStock,\n      lowStockCount: lowStock.length,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
