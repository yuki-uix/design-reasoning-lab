  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rt !important; }\n      section { padding-left: 28px !important; padding-right: 28px !important; }\n      nav { padding-left: 28px !important; padding-right: 28px !important; }\n    }\n    @media (max-width: 620px) {\n      .mb-hero-title { font-size: 34px !important; }\n      .mb-beans-grid { grid-template-columns: 1fr !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'Work Sans', sans-serif; background: #f6f0e6; color: #2a1f17; overflow-x: hidden;\">\n\n  <!-- NAV -->\n  <nav data-screen-label=\"Nav\" style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 22px 56px; background: rgba(246,240,230,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(42,31,23,0.08);\">\n    <div style=\"font-family: 'Lora', serif; font-size: 22px; font-weight: 600; letter-spacing: 0.01em;\">Millbrook &amp; Co.<\u002Fdiv>\n    <div class=\"mb-nav-links\" style=\"display: flex; gap: 36px; align-items: center;\">\n      <a href=\"#story\" style=\"font-size: 14px; color: #2a1f17; font-weight: 500;\">Our Story<\u002Fa>\n      <a href=\"#beans\" style=\"font-size: 14px; color: #2a1f17; font-weight: 500;\">Beans<\u002Fa>\n      <a href=\"#process\" style=\"font-size: 14px; color: #2a1f17; font-weight: 500;\">Craft<\u002Fa>\n      <a href=\"#visit\" style=\"font-size: 14px; color: #2a1f17; font-weight: 500;\">Visit<\u002Fa>\n      <a href=\"#subscribe\" style=\"padding: 10px 22px; background: #2a1f17; color: #f6f0e6; border-radius: 999px; font-size: 14px; font-weight: 500;\" style-hover=\"background:#4a3628;\">Subscribe<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" class=\"mb-hero-grid\" style=\"position: relative; display: grid; grid-template-columns: 1.05fr 0.95fr; align-items: center; gap: 40px; padding: 90px 56px 100px; max-width: 1400px; margin: 0 auto;\">\n    <div style=\"position: relative; z-index: 2;\">\n      <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #a8532a; font-weight: 600; margin-bottom: 22px;\">Small-batch · Roasted in the Mission<\u002Fdiv>\n      <h1 class=\"mb-hero-title\" style=\"font-family: 'Lora', serif; line-height: 1.06; font-weight: 500; margin: 0 0 26px; letter-spacing: -0.01em; text-wrap: pretty;\">Coffee roasted<br>for the people<br><em style=\"font-style: italic; color: #a8532a;\">who drink it.<\u002Fem><\u002Fh1>\n      <p style=\"font-size: 18px; line-height: 1.6; color: rgba(42,31,23,0.72); max-width: 440px; margin: 0 0 36px; text-wrap: pretty;\">We roast in three-kilo batches out of a converted garage, twice a week, and taste every single one before it ships. No middlemen, no mystery blends.<\u002Fp>\n      <div style=\"display: flex; gap: 16px; align-items: center;\">\n        <a href=\"#beans\" style=\"padding: 16px 32px; background: #2a1f17; color: #f6f0e6; border-radius: 999px; font-size: 15px; font-weight: 500;\" style-hover=\"background:#4a3628;\">Shop the roasts<\u002Fa>\n        <a href=\"#story\" style=\"padding: 16px 24px; font-size: 15px; font-weight: 500; color: #2a1f17; border-bottom: 1px solid rgba(42,31,23,0.3);\" style-hover=\"border-color:#2a1f17;\">Meet the roaster ↓<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position: relative; z-index: 1;\">\n      <div style=\"aspect-ratio: 4/5; border-radius: 18px; background: repeating-linear-gradient(135deg, #dcc7a8, #dcc7a8 12px, #d2b593 12px, #d2b593 24px); display: flex; align-items: center; justify-content: center; box-shadow: 0 30px 60px -20px rgba(42,31,23,0.35);\">\n        <span style=\"font-family: 'Work Sans', monospace; font-size: 13px; letter-spacing: 0.05em; color: #6b4a2e; background: rgba(246,240,230,0.85); padding: 8px 16px; border-radius: 999px;\">photo — roaster in action<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position: absolute; bottom: -24px; left: -32px; width: 130px; aspect-ratio: 1; background: #a8532a; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; color: #f6f0e6; font-family: 'Lora', serif; font-size: 14px; font-style: italic; padding: 10px; box-shadow: 0 20px 40px -12px rgba(168,83,42,0.5);\">est. 2016, Oakland<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STRIP -->\n  <section style=\"display: flex; justify-content: center; gap: 64px; padding: 26px 56px; border-top: 1px solid rgba(42,31,23,0.1); border-bottom: 1px solid rgba(42,31,23,0.1); flex-wrap: wrap;\">\n    <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n      <div style=\"text-align: center;\">\n        <div style=\"font-family: 'Lora', serif; font-size: 26px; font-weight: 500; color: #a8532a;\">{{ stat.value }}<\u002Fdiv>\n        <div style=\"font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(42,31,23,0.55); margin-top: 4px;\">{{ stat.label }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fsection>\n\n  <!-- STORY -->\n  <section id=\"story\" data-screen-label=\"Story\" class=\"mb-story-grid\" style=\"display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 64px; align-items: center; padding: 110px 56px; max-width: 1400px; margin: 0 auto;\">\n    <div style=\"aspect-ratio: 1; border-radius: 18px; background: repeating-linear-gradient(45deg, #e4d3ba, #e4d3ba 12px, #dac4a2 12px, #dac4a2 24px); display: flex; align-items: center; justify-content: center;\">\n      <span style=\"font-family: monospace; font-size: 13px; color: #6b4a2e; background: rgba(246,240,230,0.85); padding: 8px 16px; border-radius: 999px;\">photo — founder portrait<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #a8532a; font-weight: 600; margin-bottom: 18px;\">Our Story<\u002Fdiv>\n      <h2 style=\"font-family: 'Lora', serif; font-size: 38px; font-weight: 500; line-height: 1.2; margin: 0 0 22px; text-wrap: pretty;\">Started with a $400 sample roaster and a lot of stubbornness.<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.75; color: rgba(42,31,23,0.72); margin: 0 0 20px; text-wrap: pretty;\">Maya Reyes taught herself to roast in her garage after a decade pulling shots for other people's cafés. Nine years later, Millbrook still buys direct from six family farms, still roasts on the same block, and still won't sell a bag she hasn't cupped herself that morning.<\u002Fp>\n      <p style=\"font-size: 17px; line-height: 1.75; color: rgba(42,31,23,0.72); margin: 0; text-wrap: pretty;\">Every relationship on our sourcing list is longer than five years. We pay above fair-trade minimums, every harvest, no negotiating.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURED BEANS -->\n  <section id=\"beans\" data-screen-label=\"Featured Beans\" style=\"padding: 100px 56px; background: #efe4d1;\">\n    <div style=\"max-width: 1400px; margin: 0 auto;\">\n      <div class=\"mb-beans-header\" style=\"display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 56px; flex-wrap: wrap; gap: 20px;\">\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #a8532a; font-weight: 600; margin-bottom: 14px;\">This Week's Roasts<\u002Fdiv>\n          <h2 style=\"font-family: 'Lora', serif; font-size: 38px; font-weight: 500; margin: 0; text-wrap: pretty;\">Four origins, one roast day.<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"max-width: 360px; font-size: 15px; color: rgba(42,31,23,0.6); margin: 0; text-wrap: pretty;\">We rotate the lineup as harvests come in — what's listed is what we roasted this Tuesday.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mb-beans-grid\" style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px;\">\n        <sc-for list=\"{{ beans }}\" as=\"bean\" hint-placeholder-count=\"4\">\n          <div style=\"background: #f6f0e6; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;\">\n            <div style=\"aspect-ratio: 1; background: {{ bean.swatch }}; display: flex; align-items: center; justify-content: center;\">\n              <span style=\"font-family: monospace; font-size: 11px; color: rgba(42,31,23,0.55); background: rgba(246,240,230,0.85); padding: 6px 12px; border-radius: 999px;\">bag photo<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding: 22px 22px 26px; display: flex; flex-direction: column; gap: 8px; flex: 1;\">\n              <div style=\"font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #a8532a; font-weight: 600;\">{{ bean.origin }}<\u002Fdiv>\n              <div style=\"font-family: 'Lora', serif; font-size: 20px; font-weight: 500;\">{{ bean.name }}<\u002Fdiv>\n              <div style=\"font-size: 14px; color: rgba(42,31,23,0.62); line-height: 1.5;\">{{ bean.notes }}<\u002Fdiv>\n              <div style=\"display: flex; justify-content: space-between; align-items: center; margin-top: 12px;\">\n                <span style=\"font-family: 'Lora', serif; font-size: 17px;\">{{ bean.price }}<\u002Fspan>\n                <a href=\"#\" style=\"font-size: 13px; font-weight: 600; color: #2a1f17; border-bottom: 1px solid rgba(42,31,23,0.3);\" style-hover=\"border-color:#2a1f17;\">Add →<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROCESS -->\n  <section id=\"process\" data-screen-label=\"Process\" style=\"padding: 110px 56px; max-width: 1400px; margin: 0 auto;\">\n    <div style=\"text-align: center; max-width: 640px; margin: 0 auto 64px;\">\n      <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #a8532a; font-weight: 600; margin-bottom: 14px;\">The Craft<\u002Fdiv>\n      <h2 style=\"font-family: 'Lora', serif; font-size: 38px; font-weight: 500; margin: 0; text-wrap: pretty;\">Nothing about this scales, and that's the point.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"mb-process-grid\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;\">\n      <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"3\">\n        <div style=\"text-align: left;\">\n          <div style=\"width: 52px; height: 52px; border-radius: 50%; background: #2a1f17; color: #f6f0e6; display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; font-size: 18px; margin-bottom: 22px;\">{{ step.n }}<\u002Fdiv>\n          <h3 style=\"font-family: 'Lora', serif; font-size: 21px; font-weight: 500; margin: 0 0 12px;\">{{ step.title }}<\u002Fh3>\n          <p style=\"font-size: 15px; line-height: 1.65; color: rgba(42,31,23,0.65); margin: 0; text-wrap: pretty;\">{{ step.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SUBSCRIPTION -->\n  <section id=\"subscribe\" data-screen-label=\"Subscription\" class=\"mb-subscribe\" style=\"margin: 0 56px 110px; border-radius: 24px; background: #2a1f17; color: #f6f0e6; padding: 80px 64px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 40px;\">\n    <div>\n      <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #d8a878; font-weight: 600; margin-bottom: 18px;\">Subscriptions<\u002Fdiv>\n      <h2 style=\"font-family: 'Lora', serif; font-size: 36px; font-weight: 500; margin: 0 0 16px; max-width: 480px; text-wrap: pretty;\">Fresh beans on your schedule, roasted the day before it ships.<\u002Fh2>\n      <p style=\"font-size: 16px; color: rgba(246,240,230,0.7); margin: 0; max-width: 460px; line-height: 1.6;\">Pick a cadence, pick a grind, skip or swap anytime. Starts at $19/bag.<\u002Fp>\n    <\u002Fdiv>\n    <a href=\"#\" style=\"white-space: nowrap; padding: 18px 36px; background: #f6f0e6; color: #2a1f17; border-radius: 999px; font-size: 15px; font-weight: 600;\" style-hover=\"background:#d8a878;\">Start a subscription<\u002Fa>\n  <\u002Fsection>\n\n  <!-- VISIT / HOURS -->\n  <section id=\"visit\" data-screen-label=\"Visit\" class=\"mb-visit-grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 64px; padding: 0 56px 110px; max-width: 1400px; margin: 0 auto;\">\n    <div>\n      <div style=\"font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #a8532a; font-weight: 600; margin-bottom: 18px;\">Visit the Roastery<\u002Fdiv>\n      <h2 style=\"font-family: 'Lora', serif; font-size: 32px; font-weight: 500; margin: 0 0 20px; text-wrap: pretty;\">Come watch the drum turn.<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.7; color: rgba(42,31,23,0.68); margin: 0 0 28px; max-width: 420px;\">The tasting counter is open whenever we're roasting — walk in, we'll pour you whatever just came off the drum.<\u002Fp>\n      <div style=\"display: flex; flex-direction: column; gap: 10px; font-size: 15px;\">\n        <div style=\"display: flex; justify-content: space-between; max-width: 320px; padding-bottom: 10px; border-bottom: 1px solid rgba(42,31,23,0.12);\"><span style=\"color: rgba(42,31,23,0.55);\">Tue – Fri<\u002Fspan><span style=\"font-weight: 500;\">8am – 3pm<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; max-width: 320px; padding-bottom: 10px; border-bottom: 1px solid rgba(42,31,23,0.12);\"><span style=\"color: rgba(42,31,23,0.55);\">Saturday<\u002Fspan><span style=\"font-weight: 500;\">9am – 4pm<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; max-width: 320px;\"><span style=\"color: rgba(42,31,23,0.55);\">Sun – Mon<\u002Fspan><span style=\"font-weight: 500;\">Closed<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 15px; color: rgba(42,31,23,0.68); margin: 24px 0 0;\">4108 Telegraph Ave, Oakland CA<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-radius: 18px; background: repeating-linear-gradient(90deg, #e4d3ba, #e4d3ba 14px, #dac4a2 14px, #dac4a2 28px); display: flex; align-items: center; justify-content: center;\">\n      <span style=\"font-family: monospace; font-size: 13px; color: #6b4a2e; background: rgba(246,240,230,0.85); padding: 8px 16px; border-radius: 999px;\">map / storefront photo<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- NEWSLETTER -->\n  <section data-screen-label=\"Newsletter\" style=\"text-align: center; padding: 0 56px 110px;\">\n    <div style=\"max-width: 560px; margin: 0 auto;\">\n      <h2 style=\"font-family: 'Lora', serif; font-size: 30px; font-weight: 500; margin: 0 0 14px; text-wrap: pretty;\">Get notified when a new harvest lands.<\u002Fh2>\n      <p style=\"font-size: 15px; color: rgba(42,31,23,0.6); margin: 0 0 28px;\">One email a month, when there's actually something to roast about.<\u002Fp>\n      <form style=\"display: flex; gap: 12px; max-width: 420px; margin: 0 auto;\" onsubmit=\"{{ handleSubscribe }}\">\n        <input type=\"email\" required=\"\" placeholder=\"you@email.com\" style=\"flex: 1; padding: 15px 20px; border-radius: 999px; border: 1px solid rgba(42,31,23,0.2); background: #fff; font-size: 15px; font-family: inherit;\">\n        <button type=\"submit\" style=\"padding: 15px 26px; background: #2a1f17; color: #f6f0e6; border: none; border-radius: 999px; font-size: 15px; font-weight: 500; cursor: pointer;\" style-hover=\"background:#4a3628;\">{{ subscribeLabel }}<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer data-screen-label=\"Footer\" style=\"border-top: 1px solid rgba(42,31,23,0.1); padding: 56px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 32px; max-width: 1400px; margin: 0 auto;\">\n    <div>\n      <div style=\"font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin-bottom: 10px;\">Millbrook &amp; Co.<\u002Fdiv>\n      <p style=\"font-size: 13px; color: rgba(42,31,23,0.5); margin: 0;\">Roasted in Oakland, CA since 2016.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 56px; flex-wrap: wrap;\">\n      <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n        <span style=\"font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(42,31,23,0.45); margin-bottom: 4px;\">Shop<\u002Fspan>\n        <a href=\"#beans\" style=\"font-size: 14px;\">All roasts<\u002Fa>\n        <a href=\"#subscribe\" style=\"font-size: 14px;\">Subscriptions<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n        <span style=\"font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(42,31,23,0.45); margin-bottom: 4px;\">Company<\u002Fspan>\n        <a href=\"#story\" style=\"font-size: 14px;\">Our story<\u002Fa>\n        <a href=\"#visit\" style=\"font-size: 14px;\">Visit<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n        <span style=\"font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(42,31,23,0.45); margin-bottom: 4px;\">Follow<\u002Fspan>\n        <a href=\"#\" style=\"font-size: 14px;\">Instagram<\u002Fa>\n        <a href=\"#\" style=\"font-size: 14px;\">Newsletter<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { subscribed: false };\n\n  renderVals() {\n    return {\n      stats: [\n        { value: '3kg', label: 'Batch size' },\n        { value: '2×', label: 'Roasts weekly' },\n        { value: '6', label: 'Partner farms' },\n        { value: '9 yrs', label: 'Roasting' },\n      ],\n      beans: [\n        { origin: 'Ethiopia · Yirgacheffe', name: 'Morning Fog', notes: 'Bergamot, peach, black tea', price: '$21', swatch: '#e6c9a3' },\n        { origin: 'Colombia · Huila', name: 'Low Country', notes: 'Brown sugar, red apple, caramel', swatch: '#d6a978', price: '$19' },\n        { origin: 'Guatemala · Antigua', name: 'Volcán', notes: 'Dark chocolate, walnut, clove', swatch: '#c79466', price: '$20' },\n        { origin: 'Kenya · Nyeri', name: 'Red Gate', notes: 'Blackcurrant, grapefruit, honey', swatch: '#e3b78a', price: '$22' },\n      ],\n      steps: [\n        { n: '01', title: 'Source direct', body: 'We buy straight from six farms we visit every year, no importers in between.' },\n        { n: '02', title: 'Cup every lot', body: 'Every green lot is cupped blind before it earns a spot on the roast schedule.' },\n        { n: '03', title: 'Roast to order', body: 'Small batches, roasted within days of shipping — never sitting in a warehouse.' },\n      ],\n      subscribeLabel: this.state.subscribed ? 'Subscribed ✓' : 'Notify me',\n      handleSubscribe: (e) => { e.preventDefault(); this.setState({ subscribed: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
